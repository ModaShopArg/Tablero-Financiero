    <style>
        body { background-color: #f1f5f9; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input:disabled { background-color: #f8fafc; color: #94a3b8; cursor: not-allowed; border-color: #e2e8f0; }
        .tab-active { background-color: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        .tab-inactive { background-color: white; color: #4b5563; border-color: #d1d5db; }
        .tab-inactive:hover { background-color: #f8fafc; border-color: #94a3b8; }
        .tab-executive { background-color: #1e293b; color: white; border-color: #1e293b; }
        .tab-executive:hover { background-color: #0f172a; }
        .tab-daily { background-color: #10b981; color: white; border-color: #10b981; }
        .tab-daily:hover { background-color: #059669; }

        .sticky-col { position: sticky; left: 0; background-color: #f8fafc; z-index: 20; border-right: 2px solid #e2e8f0; }
        .sticky-head { position: sticky; top: 0; z-index: 30; }

        @media print {
            body { background-color: white !important; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            #root { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .page-break-inside-avoid { page-break-inside: avoid; }
            .print-page-break { page-break-before: always; margin-top: 2rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer, LineChart, Line, ComposedChart, AreaChart, Area, ReferenceLine, Cell, PieChart, Pie } = window.Recharts;

        // --- ICONOS ---
        const Icons = {
            Activity: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>,
            Download: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,

            DollarSign: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>,
            Target: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>,

            AlertCircle: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,

            Unlock: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>,
            Calendar: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            Table: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>,
            Globe: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            Printer: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Share: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>,
            Zap: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            ShoppingBag: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>,
            CreditCard: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>,
            Trash: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            Plus: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Cloud: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>,
            Check: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Save: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>,
            Upload: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        };

        const CEO_DATA_SNAPSHOT = null; 
        const IS_CEO_MODE = true; // ACTIVADO PERMANENTEMENTE PARA ESTA VERSIÓN ONLINE

        const CurrencyInput = ({ value, onChange, disabled, className, title }) => {
            const [isFocused, setIsFocused] = useState(false);
            const displayValue = useMemo(() => {
                if (isFocused) return value === 0 ? '' : value; 
                if (value === '' || value === null || value === undefined || isNaN(value)) return disabled ? '$ 0,00' : ''; 
                return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
            }, [value, isFocused, disabled]);

            return (
                <input
                    type={isFocused && !disabled ? "number" : "text"}
                    value={displayValue}
                    onChange={(e) => onChange(e.target.value)}
                    onFocus={() => setIsFocused(true)}
                    onBlur={() => setIsFocused(false)}
                    disabled={disabled}
                    className={className}
                    title={title}
                    step="0.01"
                />
            );
        };

        const MONTHS = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        const DAILY_MONTHS = ['Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        const BRANCHES = ['Deposito', 'Local', 'Tendens', 'Chajari'];
        const PIE_COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];

        const EMPTY_BRANCHES = [
            { name: 'Deposito', venta: '', costo: '', gastosBase: '', gastoCEO: '', costosOcultos: '', rentabPct: 40 },
            { name: 'Local', venta: '', costo: '', gastosBase: '', gastoCEO: '', costosOcultos: '', rentabPct: 60 },
            { name: 'Tendens', venta: '', costo: '', gastosBase: '', gastoCEO: '', costosOcultos: '', rentabPct: 50 },
            { name: 'Chajari', venta: '', costo: '', gastosBase: '', gastoCEO: '', costosOcultos: '', rentabPct: 40 } 
        ];

        // FUNCIONES SEGURAS DE MEMORIA
        const getSafeMonthlyData = (parsed) => {
            let valid = {};
            MONTHS.forEach(m => {
                if (parsed && parsed[m] && Array.isArray(parsed[m]) && parsed[m].length === 4) valid[m] = parsed[m];
                else valid[m] = JSON.parse(JSON.stringify(EMPTY_BRANCHES));
            });
            return valid;
        };

        const getSafeDailySales = (parsed) => {
            let valid = DAILY_MONTHS.reduce((acc, month) => { 
                acc[month] = {}; BRANCHES.forEach(b => { acc[month][b] = []; }); return acc; 
            }, {});
            if (!parsed) return valid;
            DAILY_MONTHS.forEach(m => {
                if (parsed[m]) {
                    if (Array.isArray(parsed[m])) {
                        parsed[m].forEach(s => {
                            if (s.branch && valid[m][s.branch]) valid[m][s.branch].push({ id: s.id || Math.random().toString(), day: s.day || '', concept: s.concept || 'Venta general', amount: s.amount || '' });
                        });
                    } else if (parsed[m]['Deposito'] && Array.isArray(parsed[m]['Deposito'])) {
                        BRANCHES.forEach(b => { if (parsed[m][b]) valid[m][b] = parsed[m][b]; });
                    }
                }
            });
            return valid;
        };

        const getSafeDailyExpenses = (parsed) => {
            let valid = DAILY_MONTHS.reduce((acc, month) => {
                acc[month] = {}; BRANCHES.forEach(b => { acc[month][b] = []; }); return acc;
            }, {});
            if (!parsed) return valid;
            DAILY_MONTHS.forEach(m => {
                if (parsed[m]) {
                    BRANCHES.forEach(b => {
                        if (parsed[m][b] && Array.isArray(parsed[m][b])) valid[m][b] = parsed[m][b]; 
                    });
                }
            });
            return valid;
        };

        function App() {
            const fileInputRef = useRef(null);
            
            // -- ESTADO DE AUTENTICACIÓN (NUEVO) --
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [loginUser, setLoginUser] = useState("");
            const [loginPass, setLoginPass] = useState("");
            const [loginError, setLoginError] = useState(false);

            // -- ESTADO DEL SISTEMA: CONFIGURACIÓN INYECTADA DIRECTAMENTE --
            const [cloudConfig] = useState({
                apiKey: "AIzaSyAcoZjUPF7g2mqR1RkNLpn9wrK-Y3PqPsM",
                authDomain: "erpfinanciero.firebaseapp.com",
                projectId: "erpfinanciero",
                storageBucket: "erpfinanciero.firebasestorage.app",
                messagingSenderId: "785364424617",
                appId: "1:785364424617:web:4e105895aa972a46bb16b8"
            });
            
            const [syncStatus, setSyncStatus] = useState('connecting'); // connecting, unsaved, saving, synced, permission_denied
            const [dbRef, setDbRef] = useState(null);

            // -- ESTADOS DE DATOS --
            const [monthlyData, setMonthlyData] = useState(() => getSafeMonthlyData(null));
            const [dailySales, setDailySales] = useState(() => getSafeDailySales(null));
            const [dailyExpenses, setDailyExpenses] = useState(() => getSafeDailyExpenses(null));
            
            // -- ESTADOS DE UI --
            const [selectedMonth, setSelectedMonth] = useState('Resumen Ejecutivo');
            const [salesMonth, setSalesMonth] = useState('Mayo');
            const [salesBranch, setSalesBranch] = useState('Deposito');
            const [expensesMonth, setExpensesMonth] = useState('Mayo');
            const [expensesBranch, setExpensesBranch] = useState('Deposito');
            const [isLoaded, setIsLoaded] = useState(false);

            // 1. GESTIÓN DE CONFIGURACIÓN Y CARGA INICIAL (Conectado Directo)
            useEffect(() => {
                // ESTA LÍNEA FUE MODIFICADA: Ahora SÍ se conecta a Firebase en Modo CEO
                if (IS_CEO_MODE && CEO_DATA_SNAPSHOT !== null) {
                    if (CEO_DATA_SNAPSHOT?.monthly) {
                        setMonthlyData(getSafeMonthlyData(CEO_DATA_SNAPSHOT.monthly));
                        setDailySales(getSafeDailySales(CEO_DATA_SNAPSHOT.dailySales));
                        setDailyExpenses(getSafeDailyExpenses(CEO_DATA_SNAPSHOT.dailyExpenses));
                    } else {
                        setMonthlyData(getSafeMonthlyData(CEO_DATA_SNAPSHOT));
                    }
                    setIsLoaded(true);
                    return; 
                }

                if (!window.firebase.apps.length) {
                    window.firebase.initializeApp(cloudConfig);
                }
                const database = window.firebase.firestore();
                setDbRef(database.collection('erp_data').doc('empresa_principal'));

                const unsub = database.collection('erp_data').doc('empresa_principal').onSnapshot(snap => {
                    if(snap.exists && !snap.metadata.hasPendingWrites) {
                        const d = snap.data();
                        if(d.monthly) setMonthlyData(getSafeMonthlyData(d.monthly));
                        if(d.dailySales) setDailySales(getSafeDailySales(d.dailySales));
                        if(d.dailyExpenses) setDailyExpenses(getSafeDailyExpenses(d.dailyExpenses));
                        setSyncStatus('synced');
                        setIsLoaded(true);
                    } else if (!snap.exists) {
                        setSyncStatus('unsaved');
                        setIsLoaded(true);
                    }
                }, err => {
                    console.error("Firebase Error:", err);
                    if (err.code === 'permission-denied') {
                        setSyncStatus('permission_denied');
                    } else {
                        alert("Error conectando a la Nube. Revisa tu conexión a internet.");
                        setSyncStatus('offline');
                    }
                    setIsLoaded(true);
                });

                return () => unsub();
            }, [cloudConfig]);

            // 2. FUNCIÓN PARA SUBIR A LA NUBE
            const pushToCloud = () => {
                if(!dbRef) return;
                setSyncStatus('saving');
                dbRef.set({
                    monthly: monthlyData,
                    dailySales: dailySales,
                    dailyExpenses: dailyExpenses,
                    updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    setSyncStatus('synced');
                }).catch(err => {
                    console.error("Error guardando en nube:", err);
                    if (err.code === 'permission-denied') {
                        setSyncStatus('permission_denied');
                    } else {
                        alert("No se pudo guardar en la nube.");
                        setSyncStatus('unsaved');
                    }
                });
            };

            // EXPORTACIONES JSON / CARGA MANUAL
            const exportJSON = () => {
                if (IS_CEO_MODE) return;
                const dataStr = JSON.stringify({ monthly: monthlyData, dailySales, dailyExpenses });
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `Backup_ERP_Financiero_${new Date().toISOString().slice(0,10)}.json`;
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        setMonthlyData(getSafeMonthlyData(parsed.monthly));
                        setDailySales(getSafeDailySales(parsed.dailySales));
                        setDailyExpenses(getSafeDailyExpenses(parsed.dailyExpenses));
                        if(syncStatus !== 'permission_denied') setSyncStatus('unsaved');
                        alert("✅ Datos cargados exitosamente.");
                    } catch (error) {
                        alert("❌ Error al cargar el archivo. Asegúrate de que sea un backup .json válido.");
                    }
                };
                reader.readAsText(file);
                event.target.value = ''; 
            };

            // ============================================================================
            // CALCULO CENTRAL DE DATOS
            // ============================================================================
            const effectiveData = useMemo(() => {
                const data = JSON.parse(JSON.stringify(monthlyData));
                
                DAILY_MONTHS.forEach(m => {
                    let totalVentaMes = 0;
                    let totalExpMes = 0;
                    BRANCHES.forEach(b => {
                        totalVentaMes += dailySales[m][b].reduce((sum, s) => sum + (Number(s.amount) || 0), 0);
                        totalExpMes += dailyExpenses[m][b].reduce((sum, exp) => sum + (Number(exp.fijos)||0) + (Number(exp.variables)||0) + (Number(exp.ocultos)||0) + (Number(exp.ceo)||0), 0);
                    });

                    if (totalVentaMes > 0 || totalExpMes > 0 || BRANCHES.some(b => dailyExpenses[m][b].length > 0 || dailySales[m][b].length > 0)) {
                        data[m]._isDailyDriven = true; 
                        BRANCHES.forEach((branchName, idx) => {
                            const bVenta = dailySales[m][branchName].reduce((sum, s) => sum + (Number(s.amount) || 0), 0);
                            const expBranch = dailyExpenses[m][branchName];
                            
                            const bFijos = expBranch.reduce((sum, e) => sum + (Number(e.fijos) || 0), 0);
                            const bVariables = expBranch.reduce((sum, e) => sum + (Number(e.variables) || 0), 0);
                            const bOcultos = expBranch.reduce((sum, e) => sum + (Number(e.ocultos) || 0), 0);
                            const bCeo = expBranch.reduce((sum, e) => sum + (Number(e.ceo) || 0), 0);
                            
                            data[m][idx].venta = bVenta;
                            data[m][idx].gastosBase = bFijos + bVariables; 
                            data[m][idx].costosOcultos = bOcultos;
                            data[m][idx].gastoCEO = bCeo;
                            
                            const r = data[m][idx].rentabPct || 0;
                            data[m][idx].costo = bVenta > 0 ? Number((bVenta * (1 - (r / 100))).toFixed(2)) : 0;
                        });
                    } else {
                        data[m]._isDailyDriven = false;
                    }
                });
                return data;
            }, [monthlyData, dailySales, dailyExpenses]);


            // ============================================================================
            // HANDLERS
            // ============================================================================
            const markUnsaved = () => { if(syncStatus !== 'permission_denied') setSyncStatus('unsaved'); };

            const handleMonthlyChange = (branchIndex, field, value) => {
                if (IS_CEO_MODE) return; 
                markUnsaved();
                const numValue = value === '' ? '' : parseFloat(value);
                const newData = JSON.parse(JSON.stringify(monthlyData));
                const branch = newData[selectedMonth][branchIndex];
                
                branch[field] = numValue;

                const v = Number(branch.venta) || 0;
                const c = Number(branch.costo) || 0;
                const r = Number(branch.rentabPct) || 0;

                if (field === 'venta') {
                    branch.costo = Number((v * (1 - (r / 100))).toFixed(2));
                } else if (field === 'rentabPct') {
                    branch.costo = Number((v * (1 - (r / 100))).toFixed(2));
                } else if (field === 'costo' && v > 0) {
                    branch.rentabPct = Number(((1 - (c / v)) * 100).toFixed(2));
                }
                
                setMonthlyData(newData);
            };

            const addSaleRow = () => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailySales));
                newDaily[salesMonth][salesBranch].push({ id: Date.now().toString(), day: '', concept: '', amount: '' });
                setDailySales(newDaily);
            };

            const updateSaleRow = (id, field, value) => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailySales));
                const index = newDaily[salesMonth][salesBranch].findIndex(s => s.id === id);
                if (index !== -1) {
                    if (field === 'amount') newDaily[salesMonth][salesBranch][index][field] = value === '' ? '' : parseFloat(value);
                    else newDaily[salesMonth][salesBranch][index][field] = value;
                }
                setDailySales(newDaily);
            };

            const removeSaleRow = (id) => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailySales));
                newDaily[salesMonth][salesBranch] = newDaily[salesMonth][salesBranch].filter(s => s.id !== id);
                setDailySales(newDaily);
            };

            const addExpenseRow = () => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailyExpenses));
                newDaily[expensesMonth][expensesBranch].push({ 
                    id: Date.now().toString(), day: '', concept: '', fijos: '', variables: '', ocultos: '', ceo: '' 
                });
                setDailyExpenses(newDaily);
            };

            const updateExpenseRow = (id, field, value) => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailyExpenses));
                const index = newDaily[expensesMonth][expensesBranch].findIndex(e => e.id === id);
                if (index !== -1) {
                    if (['fijos', 'variables', 'ocultos', 'ceo'].includes(field)) {
                        newDaily[expensesMonth][expensesBranch][index][field] = value === '' ? '' : parseFloat(value);
                    } else {
                        newDaily[expensesMonth][expensesBranch][index][field] = value;
                    }
                }
                setDailyExpenses(newDaily);
            };

            const removeExpenseRow = (id) => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailyExpenses));
                newDaily[expensesMonth][expensesBranch] = newDaily[expensesMonth][expensesBranch].filter(e => e.id !== id);
                setDailyExpenses(newDaily);
            };

            const copyPreviousMonth = () => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const currentIndex = MONTHS.indexOf(selectedMonth);
                if (currentIndex > 0) {
                    const prevMonth = MONTHS[currentIndex - 1];
                    const newData = JSON.parse(JSON.stringify(monthlyData));
                    newData[selectedMonth] = JSON.parse(JSON.stringify(monthlyData[prevMonth]));
                    setMonthlyData(newData);
                }
            };

            const handlePrint = () => { window.print(); };

            const exportForCEO = () => {
                alert("⚠️ IMPORTANTE PARA ENVIAR AL CEO ⚠️\n\nSi le envías el archivo .html directamente por WhatsApp o Correo, el CEO verá una pantalla en blanco porque iPhone/iPad (iOS) bloquea por seguridad las descargas internas de las gráficas.\n\nSOLUCIONES:\n1. (Recomendado) Cierra esta alerta, haz clic en 'Exportar PDF' y envíale el PDF.\n2. Sube el archivo HTML que se descargará ahora mismo a una web gratuita (como tiiny.host) y envíale el enlace de internet.");
                
                const newDoc = document.cloneNode(true);
                const rootElement = newDoc.getElementById('root');
                if (rootElement) rootElement.innerHTML = ''; 

                const scripts = newDoc.querySelectorAll('script[type="text/babel"]');
                scripts.forEach(script => {
                    if (script.innerHTML.includes('const CEO_DATA_SNAPSHOT = null;')) {
                        script.innerHTML = script.innerHTML.replace(
                            'const CEO_DATA_SNAPSHOT = null;',
                            `const CEO_DATA_SNAPSHOT = ${JSON.stringify({ monthly: monthlyData, dailySales, dailyExpenses })};`
                        );
                    }
                });

                const htmlContent = '<!DOCTYPE html>\n' + newDoc.documentElement.outerHTML;
                const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'Reporte_CEO_Finanzas.html';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // ============================================================================
            // CALCULADORA DE METRICAS
            // ============================================================================
            const calculateMetrics = (branch) => {
                const venta = Number(branch.venta) || 0;
                const costo = Number(branch.costo) || 0;
                const gastosBase = Number(branch.gastosBase) || 0;
                const gastoCEO = Number(branch.gastoCEO) || 0;
                const costosOcultos = Number(branch.costosOcultos) || 0;
                const rentabPct = Number(branch.rentabPct) || 0;

                const rentabilidad = venta - costo;
                const gastosTotales = gastosBase + gastoCEO + costosOcultos;
                const ganancia = rentabilidad - gastosTotales;
                
                const rentabPctDecimal = rentabPct / 100;
                const puntoEquilibrio = rentabPctDecimal > 0 ? gastosTotales / rentabPctDecimal : 0;
                
                return { ...branch, venta, costo, gastosBase, gastoCEO, costosOcultos, rentabPct, rentabilidad, gastosTotales, ganancia, puntoEquilibrio };
            };

            const fullYearData = useMemo(() => {
                const result = {};
                MONTHS.forEach(m => { result[m] = effectiveData[m].map(calculateMetrics); });
                return result;
            }, [effectiveData]);

            const currentMonthData = useMemo(() => {
                if (['Resumen Ejecutivo', 'Ventas Diarias', 'Gastos Diarios'].includes(selectedMonth)) return [];
                return fullYearData[selectedMonth] || [];
            }, [fullYearData, selectedMonth]);

            const monthlyTotals = useMemo(() => {
                if (['Resumen Ejecutivo', 'Ventas Diarias', 'Gastos Diarios'].includes(selectedMonth)) return null;
                if (!currentMonthData || currentMonthData.length === 0) return null;
                const totals = currentMonthData.reduce((acc, branch) => {
                    acc.venta += branch.venta; acc.costo += branch.costo; acc.rentabilidad += branch.rentabilidad;
                    acc.ganancia += branch.ganancia; acc.gastosTotales += branch.gastosTotales;
                    acc.gastosBase += branch.gastosBase; acc.gastoCEO += branch.gastoCEO; acc.costosOcultos += branch.costosOcultos;
                    acc.puntoEquilibrio += branch.puntoEquilibrio;
                    return acc;
                }, { venta: 0, costo: 0, rentabilidad: 0, ganancia: 0, gastosTotales: 0, gastosBase: 0, gastoCEO: 0, costosOcultos: 0, puntoEquilibrio: 0 });
                return totals;
            }, [currentMonthData, selectedMonth]);

            const annualData = useMemo(() => {
                return MONTHS.map(month => {
                    const monthData = fullYearData[month];
                    const totales = monthData.reduce((acc, branch) => {
                        acc.Ventas += branch.venta; acc.Costo += branch.costo; acc.Gastos += branch.gastosTotales;
                        acc.Rentabilidad += branch.rentabilidad; acc.Ganancia += branch.ganancia;
                        acc.PuntoEquilibrio += branch.puntoEquilibrio;
                        return acc;
                    }, { Ventas: 0, Costo: 0, Gastos: 0, Rentabilidad: 0, Ganancia: 0, PuntoEquilibrio: 0 });
                    return { name: month.substring(0, 3), fullMonth: month, ...totales };
                });
            }, [fullYearData]);

            const yearlyTotals = useMemo(() => {
                const totals = annualData.reduce((acc, month) => {
                    acc.venta += month.Ventas; acc.costo += month.Costo; acc.rentabilidad += month.Rentabilidad;
                    acc.gastosTotales += month.Gastos; acc.ganancia += month.Ganancia;
                    acc.puntoEquilibrio += month.PuntoEquilibrio;
                    
                    const monthRawData = fullYearData[month.fullMonth];
                    const monthBreakdown = monthRawData.reduce((mAcc, b) => {
                        mAcc.gastosBase += b.gastosBase; mAcc.gastoCEO += b.gastoCEO; mAcc.costosOcultos += b.costosOcultos;
                        return mAcc;
                    }, {gastosBase: 0, gastoCEO: 0, costosOcultos: 0});

                    acc.gastosBase += monthBreakdown.gastosBase; acc.gastoCEO += monthBreakdown.gastoCEO; acc.costosOcultos += monthBreakdown.costosOcultos;
                    
                    return acc;
                }, { venta: 0, costo: 0, rentabilidad: 0, gastosTotales: 0, ganancia: 0, gastosBase: 0, gastoCEO: 0, costosOcultos: 0, puntoEquilibrio: 0 });
                return totals;
            }, [annualData, fullYearData]);

            const matrixGanancia = useMemo(() => BRANCHES.map((name, idx) => {
                const row = { name, total: 0 };
                MONTHS.forEach(m => { const val = fullYearData[m][idx].ganancia; row[m] = val; row.total += val; });
                return row;
            }), [fullYearData]);

            const matrixVentas = useMemo(() => BRANCHES.map((name, idx) => {
                const row = { name, total: 0 };
                MONTHS.forEach(m => { const val = fullYearData[m][idx].venta; row[m] = val; row.total += val; });
                return row;
            }), [fullYearData]);

            const annualBranchTotals = useMemo(() => BRANCHES.map((name, idx) => ({
                name, venta: matrixVentas[idx].total, ganancia: matrixGanancia[idx].total, gastosTotales: MONTHS.reduce((sum, m) => sum + fullYearData[m][idx].gastosTotales, 0)
            })), [matrixVentas, matrixGanancia, fullYearData]);

            const pieAnualVentas = useMemo(() => annualBranchTotals.filter(d => d.venta > 0), [annualBranchTotals]);
            const pieAnualGastos = useMemo(() => annualBranchTotals.filter(d => d.gastosTotales > 0), [annualBranchTotals]);
            const pieMensualVentas = useMemo(() => currentMonthData ? currentMonthData.filter(d => d.venta > 0) : [], [currentMonthData]);
            const pieMensualGastos = useMemo(() => currentMonthData ? currentMonthData.filter(d => d.gastosTotales > 0) : [], [currentMonthData]);

            const formatCurrency = (value) => {
                if(value === 0 || value === null || value === undefined || isNaN(value)) return "$ 0,00";
                return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
            };
            const formatCompact = (value) => {
                if(value === 0 || value === null || isNaN(value)) return "-";
                return new Intl.NumberFormat('es-AR', { style: 'decimal', maximumFractionDigits: 0 }).format(value);
            };
            const formatMillions = (value) => value === 0 ? "$0" : `$${(value/1000000).toFixed(1)}M`;
            const customTooltipStyle = { backgroundColor: 'rgba(255, 255, 255, 0.95)', border: '1px solid #e2e8f0', borderRadius: '8px', color: '#1e293b', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)', padding: '12px', fontWeight: 'bold' };

            // ============================================================================
            // NUEVO: PANTALLA DE LOGIN
            // ============================================================================
            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUser === "adm" && loginPass === "modashopargmr") {
                    setIsAuthenticated(true);
                    setLoginError(false);
                } else {
                    setLoginError(true);
                }
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 text-slate-800 font-sans p-4">
                        <div className="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full border border-slate-700">
                            <div className="flex justify-center mb-6 text-indigo-600">
                                <Icons.Lock size={48} />
                            </div>
                            <h2 className="text-2xl font-bold text-center text-slate-900 mb-6">Acceso Restringido</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Usuario</label>
                                    <input 
                                        type="text" 
                                        value={loginUser} 
                                        onChange={(e) => setLoginUser(e.target.value)}
                                        className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                                        placeholder="Ingresar usuario"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Contraseña</label>
                                    <input 
                                        type="password" 
                                        value={loginPass} 
                                        onChange={(e) => setLoginPass(e.target.value)}
                                        className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                                        placeholder="••••••••"
                                    />
                                </div>
                                {loginError && (
                                    <p className="text-rose-500 text-sm font-bold text-center">Usuario o contraseña incorrectos</p>
                                )}
                                <button 
                                    type="submit" 
                                    className="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition-colors shadow-md mt-2"
                                >
                                    Ingresar al ERP
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (!isLoaded) return <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white font-bold">Cargando Tablero...</div>;

            return (
                <div className="min-h-screen text-slate-800 font-sans p-4 md:p-6 max-w-[1600px] mx-auto bg-gray-100">
                    
                    {/* Alerta de Error de Reglas de Firebase */}
                    {syncStatus === 'permission_denied' && (
                        <div className="mb-6 bg-rose-50 border-l-4 border-rose-500 p-6 rounded-r-xl shadow-md">
                            <h3 className="text-xl font-bold text-rose-800 flex items-center gap-2 mb-2">
                                <Icons.AlertCircle size={24}/> Acción Requerida en Firebase (Permiso Denegado)
                            </h3>
                            <p className="text-slate-700 mb-4">
                                Firebase está bloqueando la conexión por seguridad. Para permitir que tus colegas se conecten, debes actualizar las Reglas de Firestore:
                            </p>
                            <ol className="list-decimal pl-5 space-y-2 mb-4 text-slate-700 font-medium">
                                <li>Ve a <a href="https://console.firebase.google.com/" target="_blank" className="text-blue-600 underline">console.firebase.google.com</a> y abre tu proyecto.</li>
                                <li>En el menú lateral, ve a <b>Base de datos de Firestore</b>.</li>
                                <li>Haz clic en la pestaña <b>Reglas</b> (Rules).</li>
                                <li>Borra el código que haya ahí y pega <b>exactamente</b> este código nuevo:</li>
                            </ol>
                            <div className="bg-slate-900 text-emerald-400 p-4 rounded-lg font-mono text-sm relative">
                                rules_version = '2';<br/>
                                service cloud.firestore &#123;<br/>
                                &nbsp;&nbsp;match /databases/&#123;database&#125;/documents &#123;<br/>
                                &nbsp;&nbsp;&nbsp;&nbsp;match /&#123;document=**&#125; &#123;<br/>
                                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;allow read, write: if true;<br/>
                                &nbsp;&nbsp;&nbsp;&nbsp;&#125;<br/>
                                &nbsp;&nbsp;&#125;<br/>
                                &#125;
                            </div>
                            <p className="mt-4 text-rose-800 font-bold">5. Haz clic en "Publicar" (Publish). Luego recarga esta página.</p>
                            <button onClick={() => setSyncStatus('unsaved')} className="mt-4 px-4 py-2 bg-rose-600 text-white rounded-lg hover:bg-rose-700 transition-all font-bold">
                                Ya lo publiqué, intentar de nuevo
                            </button>
                        </div>
                    )}

                    {/* HEADER */}
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 p-5 rounded-xl shadow-sm border no-print bg-white border-slate-200">
                        <div>
                            <h1 className="text-2xl font-bold flex items-center gap-2 text-slate-900">
                                <div className="p-1.5 rounded text-white bg-blue-600">
                                    <Icons.Activity size={24} />
                                </div>
                                ERP Financiero Colaborativo
                            </h1>
                            <p className="text-sm mt-1 ml-10 text-slate-500">
                                Gestión Integral Mensual y Diaria.
                            </p>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-3 justify-end">
                            {/* BOTON DE NUBE / ESTADO */}
                            <button 
                                onClick={syncStatus === 'unsaved' ? pushToCloud : null}
                                className={`flex items-center gap-2 px-4 py-2.5 rounded-lg font-bold shadow-sm transition-all text-sm border ${
                                    syncStatus === 'synced' ? 'bg-emerald-50 text-emerald-700 border-emerald-200 cursor-default' : 
                                    syncStatus === 'saving' ? 'bg-blue-50 text-blue-700 border-blue-200 cursor-wait' :
                                    syncStatus === 'connecting' ? 'bg-amber-50 text-amber-700 border-amber-200 cursor-wait' :
                                    syncStatus === 'permission_denied' ? 'bg-rose-50 text-rose-700 border-rose-200 cursor-default' :
                                    'bg-indigo-600 text-white hover:bg-indigo-700 shadow-md animate-pulse cursor-pointer'
                                }`}
                            >
                                <Icons.Cloud size={18} />
                                {syncStatus === 'synced' && "Nube Sincronizada 🟢"}
                                {syncStatus === 'saving' && "Guardando..."}
                                {syncStatus === 'connecting' && "Conectando..."}
                                {syncStatus === 'permission_denied' && "Error de Permisos 🔴"}
                                {syncStatus === 'unsaved' && "Guardar en la Nube ☁️"}
                            </button>

                            {!IS_CEO_MODE && syncStatus === 'permission_denied' && (
                                <div className="flex items-center gap-2">
                                    <div className="w-px h-8 bg-slate-300 mx-1 hidden sm:block"></div>
                                    <input type="file" accept=".json" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                                    <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-1.5 px-3 py-2.5 rounded-lg font-bold text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 transition-all text-sm shadow-sm" title="Importar datos (.json)">
                                        <Icons.Upload size={16} /> <span className="hidden sm:inline">Cargar Backup</span>
                                    </button>
                                </div>
                            )}

                            <div className="w-px h-8 bg-slate-300 mx-1 hidden sm:block"></div>

                            <button onClick={handlePrint} className="flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold shadow-md text-white bg-emerald-600 hover:bg-emerald-700 transition-all text-sm">
                                <Icons.Printer size={18} /> Exportar PDF (CEO)
                            </button>
                        </div>
                    </div>

                    {/* SELECTOR DE PESTAÑAS */}
                    <div className="mb-6 no-print">
                        <div className="flex flex-wrap gap-2 pb-2">
                            {/* PESTAÑAS PRINCIPALES */}
                            <button onClick={() => setSelectedMonth('Resumen Ejecutivo')} className={`px-6 py-3 rounded-lg font-bold text-sm border-2 transition-all flex items-center gap-2 cursor-pointer ${selectedMonth === 'Resumen Ejecutivo' ? 'tab-executive shadow-lg' : 'tab-inactive bg-slate-800 text-slate-300 border-slate-700'}`}>
                                <Icons.Globe size={16} className={selectedMonth === 'Resumen Ejecutivo' ? 'text-indigo-300' : 'text-slate-400'}/>
                                RESUMEN EJECUTIVO
                            </button>
                            
                            <button onClick={() => setSelectedMonth('Ventas Diarias')} className={`px-6 py-3 rounded-lg font-bold text-sm border-2 transition-all flex items-center gap-2 cursor-pointer ${selectedMonth === 'Ventas Diarias' ? 'tab-daily shadow-lg' : 'tab-inactive'}`}>
                                <Icons.ShoppingBag size={16} /> VENTAS DIARIAS
                            </button>

                            <button onClick={() => setSelectedMonth('Gastos Diarios')} className={`px-6 py-3 rounded-lg font-bold text-sm border-2 transition-all flex items-center gap-2 cursor-pointer ${selectedMonth === 'Gastos Diarios' ? 'bg-rose-500 text-white border-rose-500 shadow-lg' : 'tab-inactive'}`}>
                                <Icons.CreditCard size={16} /> GASTOS DIARIOS
                            </button>

                            <div className="w-full h-1 mt-2 border-b border-slate-300"></div>

                            {/* PESTAÑAS DE MESES */}
                            <div className="flex flex-wrap gap-2 mt-2">
                                {MONTHS.map(month => {
                                    const isActive = selectedMonth === month;
                                    const hasDailyDriven = effectiveData[month]?._isDailyDriven;
                                    
                                    let btnClass = "px-4 py-2 rounded-lg font-bold text-sm border transition-all flex items-center gap-1.5 cursor-pointer ";
                                    if (isActive && IS_CEO_MODE) btnClass += "bg-indigo-600 text-white border-indigo-600 shadow-md";
                                    else if (isActive && !IS_CEO_MODE) btnClass += "tab-active border-blue-600";
                                    else btnClass += "tab-inactive";

                                    return (
                                        <button key={month} onClick={() => setSelectedMonth(month)} className={btnClass} title={hasDailyDriven ? "Alimentado Automáticamente por el Diario" : "Carga Manual"}>
                                            {IS_CEO_MODE ? <Icons.Lock size={12} className={isActive ? 'text-indigo-200' : 'text-slate-400'}/> : (hasDailyDriven ? <Icons.Zap size={12} className={isActive ? 'text-amber-300' : 'text-amber-500'}/> : <Icons.Unlock size={12} className={isActive ? 'text-blue-200' : 'text-blue-500'}/>)}
                                            {month.substring(0,3)}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>


                    {/* ========================================================================= */}
                    {/* VISTA A: VENTAS DIARIAS */}
                    {/* ========================================================================= */}
                    {selectedMonth === 'Ventas Diarias' && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-8 page-break-inside-avoid">
                            <div className="px-5 py-4 border-b bg-emerald-50 border-emerald-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div>
                                    <h2 className="text-xl font-bold flex items-center gap-2 text-emerald-800">
                                        <Icons.ShoppingBag size={22} className="text-emerald-600"/> Libro Diario de Ventas Netas
                                    </h2>
                                    <p className="text-sm text-emerald-600 mt-1">Registra las ventas individualmente con fecha y concepto.</p>
                                </div>
                                <div className="flex flex-col sm:flex-row items-center gap-3 bg-white p-2 rounded-lg shadow-sm border border-emerald-100">
                                    <div className="flex items-center gap-2">
                                        <span className="text-sm font-bold text-slate-600">Mes:</span>
                                        <select value={salesMonth} onChange={e => setSalesMonth(e.target.value)} className="bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 p-2 font-bold outline-none cursor-pointer">
                                            {DAILY_MONTHS.map(m => <option key={m} value={m}>{m}</option>)}
                                        </select>
                                    </div>
                                    <div className="h-6 w-px bg-slate-200 hidden sm:block"></div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-sm font-bold text-slate-600">Sucursal:</span>
                                        <select value={salesBranch} onChange={e => setSalesBranch(e.target.value)} className="bg-emerald-100 border border-emerald-300 text-emerald-900 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 p-2 font-extrabold outline-none cursor-pointer">
                                            {BRANCHES.map(b => <option key={b} value={b}>{b}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="overflow-y-auto max-h-[600px] relative no-scrollbar">
                                <table className="w-full text-sm text-left">

                                        <div className="bg-emerald-800 text-white px-4 py-1.5 border border-emerald-900 rounded-md shadow-sm">

                                            <span className="font-extrabold text-lg leading-none">

                    {/* VISTA B: GASTOS DIARIOS */}

                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-8 page-break-inside-avoid">
                            <div className="px-5 py-4 border-b bg-rose-50 border-rose-200 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                                <div>
                                    <h2 className="text-xl font-bold flex items-center gap-2 text-rose-800">
                                        <Icons.CreditCard size={22} className="text-rose-600"/> Libro Diario de Egresos

                                </div>
                                <div className="flex flex-col sm:flex-row items-center gap-3 bg-white p-2 rounded-lg shadow-sm border border-rose-100">
                                    <div className="flex items-center gap-2">
                                        <span className="text-sm font-bold text-slate-600">Mes:</span>
                                        <select value={expensesMonth} onChange={e => setExpensesMonth(e.target.value)} className="bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-rose-500 focus:border-rose-500 p-2 font-bold outline-none cursor-pointer">
                                            {DAILY_MONTHS.map(m => <option key={m} value={m}>{m}</option>)}
                                        </select>
                                    </div>
                                    <div className="h-6 w-px bg-slate-200 hidden sm:block"></div>

                                        <span className="text-sm font-bold text-slate-600">Sucursal:</span>

                                            {BRANCHES.map(b => <option key={b} value={b}>{b}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="overflow-y-auto max-h-[600px] relative no-scrollbar">
                                <table className="w-full text-sm text-left">
                                    <thead className="text-xs text-slate-600 uppercase bg-slate-100 sticky-head border-b-2 border-slate-300">
                                        <tr>
                                            <th className="px-3 py-3 font-extrabold text-center w-24">Fecha</th>
                                            <th className="px-3 py-3 font-bold w-1/4">Concepto / Detalle</th>
                                            <th className="px-3 py-3 font-bold text-right text-slate-700">G. Fijos ($)</th>
                                            <th className="px-3 py-3 font-bold text-right text-slate-700">G. Variables ($)</th>
                                            <th className="px-3 py-3 font-bold text-right text-rose-700">C. Ocultos ($)</th>
                                            <th className="px-3 py-3 font-bold text-right text-indigo-700">Gasto CEO ($)</th>
                                            <th className="px-3 py-3 font-extrabold text-right bg-slate-200">TOTAL FILA ($)</th>
                                            <th className="px-3 py-3 font-bold text-center">Acción</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {dailyExpenses[expensesMonth][expensesBranch].length === 0 ? (
                                            <tr>
                                                <td colSpan="8" className="px-4 py-8 text-center text-slate-400 font-medium">Aún no hay gastos registrados en {expensesBranch} para {expensesMonth}. Haz clic en "+ Agregar Fila".</td>
                                            </tr>
                                        ) : (
                                            dailyExpenses[expensesMonth][expensesBranch].map(exp => {
                                                const totalFila = (Number(exp.fijos)||0) + (Number(exp.variables)||0) + (Number(exp.ocultos)||0) + (Number(exp.ceo)||0);
                                                
                                                return (
                                                    <tr key={exp.id} className="hover:bg-rose-50/30 transition-colors group">
                                                        <td className="px-2 py-1">
                                                            <input type="text" placeholder="Ej: 10/5" disabled={IS_CEO_MODE} value={exp.day} onChange={(e) => updateExpenseRow(exp.id, 'day', e.target.value)}
                                                                className={`w-full text-center p-2 font-bold text-slate-600 transition-all ${IS_CEO_MODE ? 'bg-transparent' : 'border border-slate-300 rounded focus:border-rose-500 focus:ring-2 focus:ring-rose-200 outline-none'}`} />
                                                        </td>
                                                        <td className="px-2 py-1">
                                                            <input type="text" placeholder="Ej: Alquiler" disabled={IS_CEO_MODE} value={exp.concept} onChange={(e) => updateExpenseRow(exp.id, 'concept', e.target.value)}
                                                                className={`w-full text-left p-2 font-medium text-slate-700 transition-all ${IS_CEO_MODE ? 'bg-transparent' : 'border border-slate-300 rounded focus:border-rose-500 focus:ring-2 focus:ring-rose-200 outline-none'}`} />
                                                        </td>
                                                        <td className="px-2 py-1">
                                                            <CurrencyInput disabled={IS_CEO_MODE} value={exp.fijos} onChange={(val) => updateExpenseRow(exp.id, 'fijos', val)} className={`w-full text-right p-2 font-medium transition-all ${IS_CEO_MODE ? 'bg-transparent text-slate-800' : 'border border-slate-300 rounded focus:border-rose-500 focus:ring-2 focus:ring-rose-200 outline-none'}`} />
                                                        </td>
                                                        <td className="px-2 py-1">
                                                            <CurrencyInput disabled={IS_CEO_MODE} value={exp.variables} onChange={(val) => updateExpenseRow(exp.id, 'variables', val)} className={`w-full text-right p-2 font-medium transition-all ${IS_CEO_MODE ? 'bg-transparent text-slate-800' : 'border border-slate-300 rounded focus:border-rose-500 focus:ring-2 focus:ring-rose-200 outline-none'}`} />
                                                        </td>
                                                        <td className="px-2 py-1 bg-rose-50/20">
                                                            <CurrencyInput disabled={IS_CEO_MODE} value={exp.ocultos} onChange={(val) => updateExpenseRow(exp.id, 'ocultos', val)} className={`w-full text-right p-1.5 font-bold text-rose-800 transition-all ${IS_CEO_MODE ? 'bg-transparent' : 'border border-rose-300 bg-rose-50 rounded focus:border-rose-500 focus:ring-2 focus:ring-rose-200 outline-none'}`} />
                                                        </td>
                                                        <td className="px-2 py-1 bg-indigo-50/20">
                                                            <CurrencyInput disabled={IS_CEO_MODE} value={exp.ceo} onChange={(val) => updateExpenseRow(exp.id, 'ceo', val)} className={`w-full text-right p-1.5 font-bold text-indigo-800 transition-all ${IS_CEO_MODE ? 'bg-transparent' : 'border border-indigo-300 bg-indigo-50 rounded focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none'}`} />
                                                        </td>
                                                        <td className="px-3 py-2 text-right bg-slate-50 font-bold text-slate-700 whitespace-nowrap">{formatCurrency(totalFila)}</td>

                                                            {!IS_CEO_MODE && (
                                                                <button onClick={() => removeExpenseRow(exp.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Eliminar fila">

                                                                </button>
                                                            )}
                                                        </td>
                                                    </tr>

                                </table>

                                    </button>

                                            const totalField = dailyExpenses[expensesMonth][expensesBranch].reduce((sum, e) => sum + (Number(e[field])||0), 0);
                                            const titles = {fijos:'Fijos', variables:'Variables', ocultos:'Ocultos', ceo:'CEO'};
                                            return (
                                                <div key={field} className="bg-white px-3 py-1.5 border border-slate-200 rounded-md shadow-sm">
                                                    <span className="text-slate-500 text-xs uppercase block">{titles[field]}</span>
                                                    <span className="font-bold text-slate-700">{formatCurrency(totalField)}</span>
                                                </div>
                                            );
                                        })}
                                        <div className="bg-rose-800 text-white px-4 py-1.5 border border-rose-900 rounded-md shadow-sm">
                                            <span className="text-rose-200 text-xs uppercase block">Total Gastos ({expensesBranch})</span>
                                            <span className="font-extrabold text-lg leading-none">
                                                {formatCurrency(dailyExpenses[expensesMonth][expensesBranch].reduce((total, e) => total + (Number(e.fijos)||0) + (Number(e.variables)||0) + (Number(e.ocultos)||0) + (Number(e.ceo)||0), 0))}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}


                    {/* ========================================================================= */}
                    {/* VISTA C: RESUMEN EJECUTIVO */}
                    {/* ========================================================================= */}
                    {selectedMonth === 'Resumen Ejecutivo' && (
                        <div className="space-y-6">
                            
                            {/* SALUD FINANCIERA GLOBAL 2026 */}
                            <div className="bg-slate-900 p-6 md:p-8 rounded-xl shadow-lg border border-slate-800 text-white relative overflow-hidden page-break-inside-avoid">
                                <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none no-print">
                                    <Icons.Globe size={150} />
                                </div>
                                <div className="flex items-center gap-3 mb-8 border-b border-slate-700 pb-4 relative z-10">
                                    <div className="p-2 bg-indigo-600 rounded-lg text-white">
                                        <Icons.Globe size={24} />
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-extrabold text-white">Salud Financiera Anual 2026</h3>
                                        <p className="text-sm text-slate-400">Estado de resultados acumulado de todo el año</p>
                                    </div>
                                </div>

                                <div className="flex flex-col lg:flex-row gap-8 relative z-10">
                                    <div className="flex-1">
                                        <div className="bg-slate-800 rounded-xl border border-slate-700 p-6 h-full">
                                            <div className="space-y-4 text-base">
                                                <div className="flex justify-between items-center font-bold text-slate-300">
                                                    <span>(+) Ventas Netas Anuales</span>
                                                    <span className="text-xl">{formatCurrency(yearlyTotals.venta)}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-slate-400">
                                                    <span>(-) Costos Directos Totales</span>
                                                    <span>{formatCurrency(yearlyTotals.costo)}</span>
                                                </div>
                                                <div className="flex justify-between items-center font-bold text-indigo-400 border-t border-slate-600 pt-3 mt-1">
                                                    <span>(=) Margen Bruto Anual</span>
                                                    <span className="text-xl">{formatCurrency(yearlyTotals.rentabilidad)}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-slate-400 mt-2">
                                                    <span>(-) Gastos Base + CEO</span>
                                                    <span>{formatCurrency(yearlyTotals.gastosBase + yearlyTotals.gastoCEO)}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-rose-400 mt-2">
                                                    <span>(-) Comisiones y Costos Ocultos</span>
                                                    <span>{formatCurrency(yearlyTotals.costosOcultos)}</span>
                                                </div>
                                                <div className={`flex justify-between items-center font-black text-2xl border-t-2 border-slate-500 pt-4 mt-2 ${yearlyTotals.ganancia >= 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                                                    <span>(=) Resultado Neto Anual</span>
                                                    <span>{formatCurrency(yearlyTotals.ganancia)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex-1 flex flex-col justify-between gap-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-slate-800 border border-slate-700 p-4 rounded-lg">
                                                <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide">Margen Bruto Global</p>
                                                <p className="text-3xl font-extrabold text-indigo-400 mt-1">
                                                    {yearlyTotals.venta > 0 ? ((yearlyTotals.rentabilidad / yearlyTotals.venta) * 100).toFixed(1) : 0}%
                                                </p>
                                            </div>
                                            <div className="bg-slate-800 border border-slate-700 p-4 rounded-lg">
                                                <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide">Margen Neto Global</p>
                                                <p className={`text-3xl font-extrabold mt-1 ${yearlyTotals.ganancia >= 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                                                    {yearlyTotals.venta > 0 ? ((yearlyTotals.ganancia / yearlyTotals.venta) * 100).toFixed(1) : 0}%
                                                </p>
                                            </div>
                                        </div>
                                        <div className="bg-slate-800 border border-indigo-900 p-5 rounded-lg flex-1">

                                                <Icons.Activity size={16} /> Diagnóstico Anual

                                                {yearlyTotals.ganancia > 0 
                                                    ? `La proyección anual es positiva. Tras cubrir todos los costos y la estructura de gastos operativos, la empresa retiene el ${((yearlyTotals.ganancia / yearlyTotals.venta) * 100).toFixed(1)}% de sus ingresos (Ventas Netas) como ganancia neta pura. El margen bruto promedio se sitúa en un saludable ${((yearlyTotals.rentabilidad / yearlyTotals.venta) * 100).toFixed(1)}%.`
                                                    : yearlyTotals.venta === 0
                                                        ? `Sin proyección de ingresos cargada. Riesgo de déficit total equivalente a la estructura de costos fijos.`

                                                }
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                                    <p className="text-xs text-slate-500 mb-4">Ventas Netas vs Meta de Equilibrio Total (Suma lineal)</p>
                                    <div className="w-full h-[300px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={annualData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }} isAnimationActive={false}>
                                                <defs>
                                                    <linearGradient id="colorVentasGlobal" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4}/>
                                                        <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                                                    </linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} dy={10} />
                                                <YAxis axisLine={false} tickLine={false} tickFormatter={formatMillions} tick={{fill: '#94a3b8', fontSize: 12}} />
                                                <RechartsTooltip formatter={(value) => formatCurrency(value)} contentStyle={customTooltipStyle} />
                                                <Legend wrapperStyle={{fontSize: 12, paddingTop: '10px'}} />
                                                <Area type="monotone" dataKey="Ventas" fill="url(#colorVentasGlobal)" stroke="#3b82f6" strokeWidth={3} name="Ventas Netas" />
                                                <Line type="monotone" dataKey="Ganancia" stroke="#10b981" strokeWidth={4} name="Ganancia Neta" dot={{r: 4, fill: '#10b981', stroke: '#fff'}} />
                                                <Line type="stepAfter" dataKey="PuntoEquilibrio" stroke="#ef4444" strokeWidth={2} name="Punto de Eq. Total" dot={false} strokeDasharray="5 5" />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                        <h3 className="text-sm font-bold text-slate-800 mb-1">Composición de Ventas Anual</h3>
                                        <div className="w-full h-[220px]">
                                            {pieAnualVentas.length > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart isAnimationActive={false}>
                                                        <Pie data={pieAnualVentas} cx="50%" cy="50%" innerRadius={0} outerRadius={70} dataKey="venta" nameKey="name" label={({name, percent}) => percent > 0.05 ? `${name} ${(percent * 100).toFixed(0)}%` : ''} labelLine={true}>
                                                            {pieAnualVentas.map((entry, index) => <Cell key={`cell-${index}`} fill={PIE_COLORS[BRANCHES.indexOf(entry.name) % PIE_COLORS.length]} />)}
                                                        </Pie>
                                                        <RechartsTooltip formatter={(value) => formatCurrency(value)} contentStyle={customTooltipStyle} />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            ) : <div className="flex items-center justify-center h-full text-slate-400">Sin datos</div>}
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                        <h3 className="text-sm font-bold text-slate-800 mb-1">Composición de Gastos Anual</h3>
                                        <div className="w-full h-[220px]">
                                            {pieAnualGastos.length > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart isAnimationActive={false}>
                                                        <Pie data={pieAnualGastos} cx="50%" cy="50%" innerRadius={0} outerRadius={70} dataKey="gastosTotales" nameKey="name" label={({name, percent}) => percent > 0.05 ? `${name} ${(percent * 100).toFixed(0)}%` : ''} labelLine={true}>
                                                            {pieAnualGastos.map((entry, index) => <Cell key={`cell-${index}`} fill={PIE_COLORS[BRANCHES.indexOf(entry.name) % PIE_COLORS.length]} />)}
                                                        </Pie>
                                                        <RechartsTooltip formatter={(value) => formatCurrency(value)} contentStyle={customTooltipStyle} />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            ) : <div className="flex items-center justify-center h-full text-slate-400">Sin datos</div>}
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 md:col-span-2">
                                        <h3 className="text-sm font-bold text-slate-800 mb-1">Termómetro de Ganancia Anual por Sucursal</h3>

                                                <td className="px-4 py-3 font-medium text-slate-500 text-left sticky-col bg-white shadow-[1px_0_0_#e2e8f0]">(-) Costo Directo</td>
                                                {MONTHS.map(m => <td key={m} className="px-3 py-2 text-slate-500">{formatCompact(annualData.find(d => d.fullMonth === m).Costo)}</td>)}
