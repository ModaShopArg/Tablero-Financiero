<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODASHOP | ERP Financiero 2026</title>
    
    <!-- Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            magenta: '#EC008C',
                            black: '#1A1A1A',

                    fontFamily: {
                        sans: ['"Nunito"', 'ui-sans-serif', 'system-ui', 'sans-serif'],

    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <!-- FIREBASE V11 (Módulos Nativos para evitar crasheos de Babel) -->
    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Exportamos Firebase a Window para que React lo use de forma segura
        window.FirebaseSDK = {
            initializeApp, getApps, getApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, serverTimestamp
        };
    </script>

    <style>
        body { background-color: #f1f5f9; font-family: 'Nunito', ui-sans-serif, system-ui, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input:disabled { background-color: #f8fafc; color: #94a3b8; cursor: not-allowed; border-color: #e2e8f0; }
        
        .tab-active { background-color: #EC008C; color: white; border-color: #EC008C; box-shadow: 0 4px 6px -1px rgba(236, 0, 140, 0.3); }
        .tab-inactive { background-color: white; color: #4b5563; border-color: #d1d5db; }
        .tab-inactive:hover { background-color: #f8fafc; border-color: #94a3b8; }
        .tab-executive { background-color: #1A1A1A; color: white; border-color: #1A1A1A; }
        .tab-executive:hover { background-color: #000000; }
        .tab-daily { background-color: #10b981; color: white; border-color: #10b981; }
        
        .matrix-cell { min-width: 110px; }
        .sticky-col { position: sticky; left: 0; background-color: #f8fafc; z-index: 20; border-right: 2px solid #e2e8f0; }
        .sticky-head { position: sticky; top: 0; z-index: 30; }

        @media print {
            body { background-color: white !important; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            #root { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .page-break-inside-avoid { page-break-inside: avoid; }
            .print-page-break { page-break-before: always; margin-top: 2rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONOS INLINE MODASHOP ---
        const Icons = {
            ModaShopHeart: ({size=40, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" className={className}>
                    <path d="M50 80 C 50 80, 10 50, 15 25 C 17 10, 35 5, 50 25" stroke="#EC008C" strokeWidth="12" strokeLinecap="round" strokeLinejoin="round" fill="none" />
                    <path d="M50 25 C 65 5, 83 10, 85 25 C 87 50, 45 65, 45 85 C 45 95, 60 95, 65 85" stroke="#1A1A1A" strokeWidth="12" strokeLinecap="round" strokeLinejoin="round" fill="none" />
                </svg>
            ),
            Activity: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>,
            Copy: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>,
            AlertCircle: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
            Lock: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            Unlock: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>,
            Globe: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            Printer: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Zap: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            ShoppingBag: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>,
            CreditCard: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>,
            Trash: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            Plus: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Cloud: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>,
            Upload: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            X: ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        };

        const CEO_DATA_SNAPSHOT = null; 
        const IS_CEO_MODE = CEO_DATA_SNAPSHOT !== null;

        const CurrencyInput = ({ value, onChange, disabled, className, title }) => {
            const [isFocused, setIsFocused] = useState(false);
            const displayValue = useMemo(() => {
                if (isFocused) return value === 0 ? '' : value; 
                if (value === '' || value === null || value === undefined || isNaN(value)) return disabled ? '$ 0,00' : ''; 
                return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
            }, [value, isFocused, disabled]);

            return (
                <input
                    type={isFocused && !disabled ? "number" : "text"}
                    value={displayValue}
                    onChange={(e) => onChange(e.target.value)}
                    onFocus={() => setIsFocused(true)}
                    onBlur={() => setIsFocused(false)}
                    disabled={disabled}
                    className={className}
                    title={title}
                    step="0.01"
                />
            );
        };

        const MONTHS = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        const DAILY_MONTHS = ['Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        const BRANCHES = ['Deposito', 'Local', 'Tendens', 'Chajari'];
        const PIE_COLORS = ['#EC008C', '#1A1A1A', '#64748b', '#cbd5e1', '#f472b6'];

        const EMPTY_BRANCHES = [
            { name: 'Deposito', venta: '', costo: '', gastosBase: '', gastoCEO: '', costosOcultos: '', rentabPct: 40 },
            { name: 'Local', venta: '', costo: '', gastosBase: '', gastoCEO: '', costosOcultos: '', rentabPct: 60 },
            { name: 'Tendens', venta: '', costo: '', gastosBase: '', gastoCEO: '', costosOcultos: '', rentabPct: 50 },
            { name: 'Chajari', venta: '', costo: '', gastosBase: '', gastoCEO: '', costosOcultos: '', rentabPct: 40 } 
        ];

        const getSafeMonthlyData = (parsed) => {
            let valid = {};
            MONTHS.forEach(m => {
                if (parsed && parsed[m] && Array.isArray(parsed[m]) && parsed[m].length === 4) valid[m] = parsed[m];
                else valid[m] = JSON.parse(JSON.stringify(EMPTY_BRANCHES));
            });
            return valid;
        };

        const getSafeDailySales = (parsed) => {
            let valid = DAILY_MONTHS.reduce((acc, month) => { 
                acc[month] = {}; BRANCHES.forEach(b => { acc[month][b] = []; }); return acc; 
            }, {});
            if (!parsed) return valid;
            DAILY_MONTHS.forEach(m => {
                if (parsed[m]) {
                    if (Array.isArray(parsed[m])) {
                        parsed[m].forEach(s => {
                            if (s.branch && valid[m][s.branch]) valid[m][s.branch].push({ id: s.id || Math.random().toString(), day: s.day || '', concept: s.concept || 'Venta general', amount: s.amount || '' });
                        });
                    } else if (parsed[m]['Deposito'] && Array.isArray(parsed[m]['Deposito'])) {
                        BRANCHES.forEach(b => { if (parsed[m][b]) valid[m][b] = parsed[m][b]; });
                    }
                }
            });
            return valid;
        };

        const getSafeDailyExpenses = (parsed) => {
            let valid = DAILY_MONTHS.reduce((acc, month) => {
                acc[month] = {}; BRANCHES.forEach(b => { acc[month][b] = []; }); return acc;
            }, {});
            if (!parsed) return valid;
            DAILY_MONTHS.forEach(m => {
                if (parsed[m]) {
                    BRANCHES.forEach(b => {
                        if (parsed[m][b] && Array.isArray(parsed[m][b])) valid[m][b] = parsed[m][b]; 
                    });
                }
            });
            return valid;
        };

        function App() {
            // 1. ESTADO DE CARGA SEGURO
            const [isLibrariesLoaded, setIsLibrariesLoaded] = useState(false);
            const [firebaseInstances, setFirebaseInstances] = useState(null);
            
            // --- NUEVOS ESTADOS PARA LOGIN ---
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(false);

            const fileInputRef = useRef(null);
            const [user, setUser] = useState(null);
            const [syncStatus, setSyncStatus] = useState('connecting');
            
            // -- ESTADOS DE DATOS --
            const [monthlyData, setMonthlyData] = useState(() => getSafeMonthlyData(null));
            const [dailySales, setDailySales] = useState(() => getSafeDailySales(null));
            const [dailyExpenses, setDailyExpenses] = useState(() => getSafeDailyExpenses(null));
            
            // -- ESTADOS DE UI --
            const [selectedMonth, setSelectedMonth] = useState('Resumen Ejecutivo');
            const [salesMonth, setSalesMonth] = useState('Mayo');
            const [salesBranch, setSalesBranch] = useState('Deposito');
            const [expensesMonth, setExpensesMonth] = useState('Mayo');
            const [expensesBranch, setExpensesBranch] = useState('Deposito');
            const [isLoaded, setIsLoaded] = useState(false);
            const [modalInfo, setModalInfo] = useState(null);

            // 2. INICIALIZAR LIBRERÍAS DE FORMA SEGURA (Previene pantalla en blanco)
            useEffect(() => {
                const checkLibs = setInterval(() => {
                    if (window.Recharts && window.FirebaseSDK) {
                        clearInterval(checkLibs);
                        setIsLibrariesLoaded(true);
                        
                        try {
                            const { initializeApp, getApps, getApp, getAuth, getFirestore } = window.FirebaseSDK;
                            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                          apiKey: "AIzaSyAbCvyEK7qmjQKCCXGIJ2KI6aW06UCCNfY",
                          authDomain: "tablero-financiero-5de84.firebaseapp.com",
                          projectId: "tablero-financiero-5de84",
                          storageBucket: "tablero-financiero-5de84.firebasestorage.app",
                          messagingSenderId: "288764201482",
                          appId: "1:288764201482:web:b61a7c0e7d14aba1d8edf3"
                            };
                            const app = getApps().length > 0 ? getApp() : initializeApp(firebaseConfig);
                            setFirebaseInstances({
                                auth: getAuth(app),
                                db: getFirestore(app)
                            });
                        } catch(e) {
                            console.error("Error inicializando Firebase:", e);
                        }
                    }
                }, 100);
                return () => clearInterval(checkLibs);
            }, []);

            // FUNCION SEGURA PARA OBTENER EL DOCUMENTO
            // Se arregló el error de 5 segmentos a 6 segmentos: Colección -> Documento -> Colección -> Documento
            const getDocRef = () => {
                if (!firebaseInstances) return null;
                const { db } = firebaseInstances;
                const { doc } = window.FirebaseSDK;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'modashop-erp-local';
                const isCanvas = typeof __firebase_config !== 'undefined';
                
                return isCanvas
                    ? doc(db, 'artifacts', appId, 'public', 'data', 'erp_data', 'empresa_principal')
                    : doc(db, 'erp_data', 'empresa_principal');
            };

            // 3. AUTENTICACIÓN
            useEffect(() => {
                if (!firebaseInstances) return;
                const { auth } = firebaseInstances;
                const { signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Error de autenticación:", error);
                        setIsLoaded(true);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, [firebaseInstances]);

            // 4. LECTURA DE DATOS
            useEffect(() => {
                if (IS_CEO_MODE) {
                    if (CEO_DATA_SNAPSHOT?.monthly) {
                        setMonthlyData(getSafeMonthlyData(CEO_DATA_SNAPSHOT.monthly));
                        setDailySales(getSafeDailySales(CEO_DATA_SNAPSHOT.dailySales));
                        setDailyExpenses(getSafeDailyExpenses(CEO_DATA_SNAPSHOT.dailyExpenses));
                    } else {
                        setMonthlyData(getSafeMonthlyData(CEO_DATA_SNAPSHOT));
                    }
                    setIsLoaded(true);
                    return; 
                }

                if (!user || !firebaseInstances) return;

                const { onSnapshot } = window.FirebaseSDK;
                const docRef = getDocRef();

                if (!docRef) return;

                const unsub = onSnapshot(docRef, snap => {
                    if(snap.exists()) {
                        const d = snap.data();
                        if(d.monthly) setMonthlyData(getSafeMonthlyData(d.monthly));
                        if(d.dailySales) setDailySales(getSafeDailySales(d.dailySales));
                        if(d.dailyExpenses) setDailyExpenses(getSafeDailyExpenses(d.dailyExpenses));
                        setSyncStatus('synced');
                        setIsLoaded(true);
                    } else {
                        setSyncStatus('synced');
                        setIsLoaded(true);
                    }
                }, err => {
                    console.error("Firebase Error:", err);
                    if (err.code === 'permission-denied') {
                        setSyncStatus('permission_denied');
                    } else {
                        setSyncStatus('offline');
                    }
                    setIsLoaded(true);
                });

                return () => unsub();
            }, [user, firebaseInstances]);

            // 5. SISTEMA DE AUTOGUARDADO (Debounce de 1.5 segundos)
            useEffect(() => {
                if (IS_CEO_MODE || !isLoaded || !user || !firebaseInstances || syncStatus !== 'unsaved') return;

                const timer = setTimeout(() => {
                    setSyncStatus('saving');
                    const { setDoc, serverTimestamp } = window.FirebaseSDK;
                    const docRef = getDocRef();
                    
                    if (!docRef) return;

                    setDoc(docRef, {
                        monthly: monthlyData,
                        dailySales: dailySales,
                        dailyExpenses: dailyExpenses,
                        updatedAt: serverTimestamp()
                    }, { merge: true })
                    .then(() => {
                        setSyncStatus('synced');
                    })
                    .catch(err => {
                        console.error("Error guardando en nube:", err);
                        if (err.code === 'permission-denied') {
                            setSyncStatus('permission_denied');
                        } else {
                            setSyncStatus('unsaved');
                        }
                    });
                }, 1500);

                return () => clearTimeout(timer);
            }, [monthlyData, dailySales, dailyExpenses, syncStatus, isLoaded, user, firebaseInstances]);

            // ============================================================================
            // CALCULO CENTRAL DE DATOS
            // ============================================================================
            const effectiveData = useMemo(() => {
                const data = JSON.parse(JSON.stringify(monthlyData));
                
                DAILY_MONTHS.forEach(m => {
                    let totalVentaMes = 0;
                    let totalExpMes = 0;
                    BRANCHES.forEach(b => {
                        totalVentaMes += dailySales[m][b].reduce((sum, s) => sum + (Number(s.amount) || 0), 0);
                        totalExpMes += dailyExpenses[m][b].reduce((sum, exp) => sum + (Number(exp.fijos)||0) + (Number(exp.variables)||0) + (Number(exp.ocultos)||0) + (Number(exp.ceo)||0), 0);
                    });

                    if (totalVentaMes > 0 || totalExpMes > 0 || BRANCHES.some(b => dailyExpenses[m][b].length > 0 || dailySales[m][b].length > 0)) {
                        data[m]._isDailyDriven = true; 
                        BRANCHES.forEach((branchName, idx) => {
                            const bVenta = dailySales[m][branchName].reduce((sum, s) => sum + (Number(s.amount) || 0), 0);
                            const expBranch = dailyExpenses[m][branchName];
                            
                            const bFijos = expBranch.reduce((sum, e) => sum + (Number(e.fijos) || 0), 0);
                            const bVariables = expBranch.reduce((sum, e) => sum + (Number(e.variables) || 0), 0);
                            const bOcultos = expBranch.reduce((sum, e) => sum + (Number(e.ocultos) || 0), 0);
                            const bCeo = expBranch.reduce((sum, e) => sum + (Number(e.ceo) || 0), 0);
                            
                            data[m][idx].venta = bVenta;
                            data[m][idx].gastosBase = bFijos + bVariables; 
                            data[m][idx].costosOcultos = bOcultos;
                            data[m][idx].gastoCEO = bCeo;
                            
                            const r = data[m][idx].rentabPct || 0;
                            data[m][idx].costo = bVenta > 0 ? Number((bVenta * (1 - (r / 100))).toFixed(2)) : 0;
                        });
                    } else {
                        data[m]._isDailyDriven = false;
                    }
                });
                return data;
            }, [monthlyData, dailySales, dailyExpenses]);

            // ============================================================================
            // HANDLERS
            // ============================================================================
            const markUnsaved = () => { if(syncStatus !== 'permission_denied') setSyncStatus('unsaved'); };

            const handleMonthlyChange = (branchIndex, field, value) => {
                if (IS_CEO_MODE) return; 
                markUnsaved();
                const numValue = value === '' ? '' : parseFloat(value);
                const newData = JSON.parse(JSON.stringify(monthlyData));
                const branch = newData[selectedMonth][branchIndex];
                
                branch[field] = numValue;

                const v = Number(branch.venta) || 0;
                const c = Number(branch.costo) || 0;
                const r = Number(branch.rentabPct) || 0;

                if (field === 'venta') {
                    branch.costo = Number((v * (1 - (r / 100))).toFixed(2));
                } else if (field === 'rentabPct') {
                    branch.costo = Number((v * (1 - (r / 100))).toFixed(2));
                } else if (field === 'costo' && v > 0) {
                    branch.rentabPct = Number(((1 - (c / v)) * 100).toFixed(2));
                }
                
                setMonthlyData(newData);
            };

            const addSaleRow = () => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailySales));
                newDaily[salesMonth][salesBranch].push({ id: Date.now().toString(), day: '', concept: '', amount: '' });
                setDailySales(newDaily);
            };

            const updateSaleRow = (id, field, value) => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailySales));
                const index = newDaily[salesMonth][salesBranch].findIndex(s => s.id === id);
                if (index !== -1) {
                    if (field === 'amount') newDaily[salesMonth][salesBranch][index][field] = value === '' ? '' : parseFloat(value);
                    else newDaily[salesMonth][salesBranch][index][field] = value;
                }
                setDailySales(newDaily);
            };

            const removeSaleRow = (id) => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailySales));
                newDaily[salesMonth][salesBranch] = newDaily[salesMonth][salesBranch].filter(s => s.id !== id);
                setDailySales(newDaily);
            };

            const addExpenseRow = () => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailyExpenses));
                newDaily[expensesMonth][expensesBranch].push({ 
                    id: Date.now().toString(), day: '', concept: '', fijos: '', variables: '', ocultos: '', ceo: '' 
                });
                setDailyExpenses(newDaily);
            };

            const updateExpenseRow = (id, field, value) => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailyExpenses));
                const index = newDaily[expensesMonth][expensesBranch].findIndex(e => e.id === id);
                if (index !== -1) {
                    if (['fijos', 'variables', 'ocultos', 'ceo'].includes(field)) {
                        newDaily[expensesMonth][expensesBranch][index][field] = value === '' ? '' : parseFloat(value);
                    } else {
                        newDaily[expensesMonth][expensesBranch][index][field] = value;
                    }
                }
                setDailyExpenses(newDaily);
            };

            const removeExpenseRow = (id) => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const newDaily = JSON.parse(JSON.stringify(dailyExpenses));
                newDaily[expensesMonth][expensesBranch] = newDaily[expensesMonth][expensesBranch].filter(e => e.id !== id);
                setDailyExpenses(newDaily);
            };

            const copyPreviousMonth = () => {
                if (IS_CEO_MODE) return;
                markUnsaved();
                const currentIndex = MONTHS.indexOf(selectedMonth);
                if (currentIndex > 0) {
                    const prevMonth = MONTHS[currentIndex - 1];
                    const newData = JSON.parse(JSON.stringify(monthlyData));
                    newData[selectedMonth] = JSON.parse(JSON.stringify(monthlyData[prevMonth]));
                    setMonthlyData(newData);
                }
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        setMonthlyData(getSafeMonthlyData(parsed.monthly));
                        setDailySales(getSafeDailySales(parsed.dailySales));
                        setDailyExpenses(getSafeDailyExpenses(parsed.dailyExpenses));
                        if(syncStatus !== 'permission_denied') setSyncStatus('unsaved');
                        setModalInfo({ title: "Éxito", message: "✅ Datos cargados exitosamente." });
                    } catch (error) {
                        setModalInfo({ title: "Error", message: "❌ Error al cargar el archivo. Asegúrate de que sea un backup .json válido." });
                    }
                };
                reader.readAsText(file);
                event.target.value = ''; 
            };

            const exportForCEO = () => {
                setModalInfo({ 
                    title: "⚠️ IMPORTANTE PARA ENVIAR AL CEO ⚠️", 
                    message: "Si le envías el archivo .html directamente por WhatsApp o Correo, el CEO verá una pantalla en blanco en iOS.\n\nTe recomiendo usar la ventana de impresión (que se abrirá ahora) y guardar directamente como PDF." 
                });
                setTimeout(() => window.print(), 4000);
            };

            // ============================================================================
            // CALCULADORA DE METRICAS
            // ============================================================================
            const calculateMetrics = (branch) => {
                const venta = Number(branch.venta) || 0;
                const costo = Number(branch.costo) || 0;
                const gastosBase = Number(branch.gastosBase) || 0;
                const gastoCEO = Number(branch.gastoCEO) || 0;
                const costosOcultos = Number(branch.costosOcultos) || 0;
                const rentabPct = Number(branch.rentabPct) || 0;

                const rentabilidad = venta - costo;
                const gastosTotales = gastosBase + gastoCEO + costosOcultos;
                const ganancia = rentabilidad - gastosTotales;
                
                const rentabPctDecimal = rentabPct / 100;
                const puntoEquilibrio = rentabPctDecimal > 0 ? gastosTotales / rentabPctDecimal : 0;
                
                return { ...branch, venta, costo, gastosBase, gastoCEO, costosOcultos, rentabPct, rentabilidad, gastosTotales, ganancia, puntoEquilibrio };
            };

            const fullYearData = useMemo(() => {
                const result = {};
                MONTHS.forEach(m => { result[m] = effectiveData[m].map(calculateMetrics); });
                return result;
            }, [effectiveData]);

            const currentMonthData = useMemo(() => {
                if (['Resumen Ejecutivo', 'Ventas Diarias', 'Gastos Diarios'].includes(selectedMonth)) return [];
                return fullYearData[selectedMonth] || [];
            }, [fullYearData, selectedMonth]);

            const monthlyTotals = useMemo(() => {
                if (['Resumen Ejecutivo', 'Ventas Diarias', 'Gastos Diarios'].includes(selectedMonth)) return null;
                if (!currentMonthData || currentMonthData.length === 0) return null;
                const totals = currentMonthData.reduce((acc, branch) => {
                    acc.venta += branch.venta; acc.costo += branch.costo; acc.rentabilidad += branch.rentabilidad;
                    acc.ganancia += branch.ganancia; acc.gastosTotales += branch.gastosTotales;
                    acc.gastosBase += branch.gastosBase; acc.gastoCEO += branch.gastoCEO; acc.costosOcultos += branch.costosOcultos;
                    acc.puntoEquilibrio += branch.puntoEquilibrio;
                    return acc;
                }, { venta: 0, costo: 0, rentabilidad: 0, ganancia: 0, gastosTotales: 0, gastosBase: 0, gastoCEO: 0, costosOcultos: 0, puntoEquilibrio: 0 });
                return totals;
            }, [currentMonthData, selectedMonth]);

            const annualData = useMemo(() => {
                return MONTHS.map(month => {
                    const monthData = fullYearData[month];
                    const totales = monthData.reduce((acc, branch) => {
                        acc.Ventas += branch.venta; acc.Costo += branch.costo; acc.Gastos += branch.gastosTotales;
                        acc.Rentabilidad += branch.rentabilidad; acc.Ganancia += branch.ganancia;
                        acc.PuntoEquilibrio += branch.puntoEquilibrio;
                        return acc;
                    }, { Ventas: 0, Costo: 0, Gastos: 0, Rentabilidad: 0, Ganancia: 0, PuntoEquilibrio: 0 });
                    return { name: month.substring(0, 3), fullMonth: month, ...totales };
                });
            }, [fullYearData]);

            const yearlyTotals = useMemo(() => {
                const totals = annualData.reduce((acc, month) => {
                    acc.venta += month.Ventas; acc.costo += month.Costo; acc.rentabilidad += month.Rentabilidad;
                    acc.gastosTotales += month.Gastos; acc.ganancia += month.Ganancia;
                    acc.puntoEquilibrio += month.PuntoEquilibrio;
                    
                    const monthRawData = fullYearData[month.fullMonth];
                    const monthBreakdown = monthRawData.reduce((mAcc, b) => {
                        mAcc.gastosBase += b.gastosBase; mAcc.gastoCEO += b.gastoCEO; mAcc.costosOcultos += b.costosOcultos;
                        return mAcc;
                    }, {gastosBase: 0, gastoCEO: 0, costosOcultos: 0});

                    acc.gastosBase += monthBreakdown.gastosBase; acc.gastoCEO += monthBreakdown.gastoCEO; acc.costosOcultos += monthBreakdown.costosOcultos;
                    
                    return acc;
                }, { venta: 0, costo: 0, rentabilidad: 0, gastosTotales: 0, ganancia: 0, gastosBase: 0, gastoCEO: 0, costosOcultos: 0, puntoEquilibrio: 0 });
                return totals;
            }, [annualData, fullYearData]);

            const formatCurrency = (value) => {
                if(value === 0 || value === null || value === undefined || isNaN(value)) return "$ 0,00";
                return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
            };
            const formatMillions = (value) => value === 0 ? "$0" : `$${(value/1000000).toFixed(1)}M`;
            const customTooltipStyle = { backgroundColor: 'rgba(255, 255, 255, 0.95)', border: '1px solid #e2e8f0', borderRadius: '8px', color: '#1e293b', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)', padding: '12px', fontWeight: 'bold' };

            const annualBranchTotals = useMemo(() => BRANCHES.map((name, idx) => ({
                name, venta: MONTHS.reduce((sum, m) => sum + fullYearData[m][idx].venta, 0), ganancia: MONTHS.reduce((sum, m) => sum + fullYearData[m][idx].ganancia, 0), gastosTotales: MONTHS.reduce((sum, m) => sum + fullYearData[m][idx].gastosTotales, 0)
            })), [fullYearData]);

            const pieAnualVentas = useMemo(() => annualBranchTotals.filter(d => d.venta > 0), [annualBranchTotals]);
            const pieAnualGastos = useMemo(() => annualBranchTotals.filter(d => d.gastosTotales > 0), [annualBranchTotals]);

            // =======================================================================================
            // HANDLER DE LOGIN
            // =======================================================================================
            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'adm' && password === 'modashopargmr') {
                    setIsAuthenticated(true);
                    setLoginError(false);
                } else {
                    setLoginError(true);
                }
            };

            // =======================================================================================
            // RENDERIZADO (Protegido por el Loading Guard para evitar Crasheos)
            // =======================================================================================
            if (!isLibrariesLoaded) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-brand-black text-white p-6 text-center">
                        <Icons.Activity size={80} className="animate-pulse mb-6 text-brand-magenta" />
                        <h2 className="text-2xl font-bold text-brand-magenta mb-2">Iniciando...</h2>
                        <p className="text-slate-400">Descargando componentes seguros.</p>
                    </div>
                );
            }

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-brand-black p-4">
                        <div className="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-slate-800">
                            <div className="text-center mb-8">
                                <h2 className="text-3xl font-extrabold text-brand-black tracking-tight">MODA<span className="text-brand-magenta">SHOP</span></h2>
                                <p className="text-sm text-slate-500 font-bold mt-2">Acceso al ERP Financiero</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Usuario</label>
                                    <input type="text" value={username} onChange={e => setUsername(e.target.value)} className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-magenta focus:border-brand-magenta outline-none transition-all font-semibold" placeholder="Ingrese su usuario" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Contraseña</label>
                                    <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-magenta focus:border-brand-magenta outline-none transition-all font-semibold" placeholder="••••••••" />
                                </div>
                                {loginError && <p className="text-rose-500 text-sm font-bold text-center bg-rose-50 p-2 rounded">Credenciales incorrectas</p>}
                                <button type="submit" className="w-full bg-brand-magenta hover:bg-pink-600 text-white font-bold py-3 rounded-lg transition-colors mt-2 shadow-md">
                                    Ingresar
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (!isLoaded) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-brand-black text-white p-6 text-center">
                        <Icons.Activity size={80} className="animate-pulse mb-6 text-brand-magenta" />
                        <h2 className="text-2xl font-bold text-brand-magenta mb-2">Conectando al ERP...</h2>
                        <p className="text-slate-400">Sincronizando la base de datos de forma segura.</p>
                    </div>
                );
            }

            // Destructuración segura de Recharts una vez que sabemos que existe
            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer, LineChart, Line, ComposedChart, AreaChart, Area, ReferenceLine, Cell, PieChart, Pie } = window.Recharts;

            return (
                <div className="min-h-screen text-slate-800 font-sans p-4 md:p-6 max-w-[1600px] mx-auto bg-gray-100">
                    
                    {/* MODAL PARA ALERTAS */}
                    {modalInfo && (
                        <div className="fixed inset-0 bg-brand-black/60 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-xl p-6 max-w-md w-full shadow-2xl">
                                <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                                    <h3 className="text-xl font-bold text-slate-800">{modalInfo.title}</h3>
                                    <button onClick={() => setModalInfo(null)} className="text-slate-400 hover:text-brand-magenta bg-slate-100 hover:bg-pink-50 p-1.5 rounded-lg transition-colors"><Icons.X size={20} /></button>
                                </div>
                                <p className="text-slate-600 mb-6 whitespace-pre-wrap">{modalInfo.message}</p>
                                <button onClick={() => setModalInfo(null)} className="w-full bg-brand-magenta text-white font-bold py-2.5 rounded-lg hover:bg-pink-700 transition-colors shadow-sm">
                                    Entendido
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ALERTA REGLAS FIREBASE */}
                    {syncStatus === 'permission_denied' && (
                        <div className="mb-6 bg-rose-50 border-l-4 border-rose-500 p-6 rounded-r-xl shadow-md">
                            <h3 className="text-xl font-bold text-rose-800 flex items-center gap-2 mb-2">
                                <Icons.AlertCircle size={24}/> Acción Requerida en Firebase (Permiso Denegado)
                            </h3>
                            <p className="text-slate-700 mb-4">
                                Firebase está bloqueando la conexión por seguridad. Debes actualizar las <b>Reglas de Firestore</b> a:<br/> <code>allow read, write: if true;</code>
                            </p>
                            <button onClick={() => setSyncStatus('unsaved')} className="mt-2 px-4 py-2 bg-rose-600 text-white rounded-lg hover:bg-rose-700 transition-all font-bold">
                                Ya lo publiqué, intentar de nuevo
                            </button>
                        </div>
                    )}

                    {/* HEADER IDENTIDAD MODASHOP */}
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 p-5 rounded-xl shadow-sm border no-print bg-white border-slate-200">
                        <div>
                            <h1 className="text-3xl font-extrabold flex items-center gap-3 text-brand-black tracking-tight">
                                <div className="flex items-center gap-1">
                                    <span className="mt-1">MODA<span className="font-medium">SHOP</span></span>
                                </div>
                                <span className="text-slate-300 mx-2 font-light hidden sm:inline">|</span>
                                <span className="text-xl font-bold text-slate-500 mt-2 hidden sm:inline">ERP Financiero</span>
                            </h1>
                            <p className="text-sm mt-1 text-slate-500 font-semibold">
                                Gestión Integral Mensual y Diaria. Autoguardado activado.
                            </p>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-3 justify-end">
                            {/* INDICADOR DE AUTO-GUARDADO */}
                            <div className={`flex items-center gap-2 px-4 py-2.5 rounded-lg font-bold shadow-sm transition-all text-sm border ${
                                    syncStatus === 'synced' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 
                                    syncStatus === 'saving' ? 'bg-pink-50 text-brand-magenta border-pink-200' :
                                    syncStatus === 'connecting' ? 'bg-amber-50 text-amber-700 border-amber-200' :
                                    syncStatus === 'permission_denied' ? 'bg-rose-50 text-rose-700 border-rose-200' :
                                    'bg-slate-100 text-slate-600 border-slate-300'
                                }`}
                            >
                                <Icons.Cloud size={18} />
                                {syncStatus === 'synced' && "Guardado en Nube 🟢"}
                                {syncStatus === 'saving' && "Guardando Automáticamente..."}
                                {syncStatus === 'connecting' && "Conectando..."}
                                {syncStatus === 'permission_denied' && "Error de Permisos 🔴"}
                                {syncStatus === 'unsaved' && "Detectando cambios..."}
                            </div>

                            {!IS_CEO_MODE && syncStatus === 'permission_denied' && (
                                <div className="flex items-center gap-2">
                                    <input type="file" accept=".json" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                                    <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-1.5 px-3 py-2.5 rounded-lg font-bold text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 transition-all text-sm shadow-sm" title="Importar datos (.json)">
                                        <Icons.Upload size={16} /> <span className="hidden sm:inline">Cargar Backup</span>
                                    </button>
                                </div>
                            )}

                            <div className="w-px h-8 bg-slate-300 mx-1 hidden sm:block"></div>

                            <button onClick={exportForCEO} className="flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold shadow-md text-white bg-brand-black hover:bg-black transition-all text-sm">
                                <Icons.Printer size={18} /> Exportar PDF (CEO)
                            </button>
                        </div>
                    </div>

                    {/* SELECTOR DE PESTAÑAS */}
                    <div className="mb-6 no-print">
                        <div className="flex flex-wrap gap-2 pb-2">
                            <button onClick={() => setSelectedMonth('Resumen Ejecutivo')} className={`px-6 py-3 rounded-lg font-bold text-sm border-2 transition-all flex items-center gap-2 cursor-pointer ${selectedMonth === 'Resumen Ejecutivo' ? 'tab-executive shadow-lg' : 'tab-inactive bg-slate-800 text-slate-300 border-slate-700'}`}>
                                <Icons.Globe size={16} className={selectedMonth === 'Resumen Ejecutivo' ? 'text-brand-magenta' : 'text-slate-400'}/> RESUMEN EJECUTIVO
                            </button>
                            <button onClick={() => setSelectedMonth('Ventas Diarias')} className={`px-6 py-3 rounded-lg font-bold text-sm border-2 transition-all flex items-center gap-2 cursor-pointer ${selectedMonth === 'Ventas Diarias' ? 'tab-daily shadow-lg' : 'tab-inactive'}`}>
                                <Icons.ShoppingBag size={16} /> VENTAS DIARIAS
                            </button>
                            <button onClick={() => setSelectedMonth('Gastos Diarios')} className={`px-6 py-3 rounded-lg font-bold text-sm border-2 transition-all flex items-center gap-2 cursor-pointer ${selectedMonth === 'Gastos Diarios' ? 'bg-rose-500 text-white border-rose-500 shadow-lg' : 'tab-inactive'}`}>
                                <Icons.CreditCard size={16} /> GASTOS DIARIOS
                            </button>

                            <div className="w-full h-1 mt-2 border-b border-slate-300"></div>

                            <div className="flex flex-wrap gap-2 mt-2">
                                {MONTHS.map(month => {
                                    const isActive = selectedMonth === month;
                                    const hasDailyDriven = effectiveData[month]?._isDailyDriven;
                                    let btnClass = "px-4 py-2 rounded-lg font-bold text-sm border transition-all flex items-center gap-1.5 cursor-pointer ";
                                    if (isActive && IS_CEO_MODE) btnClass += "bg-brand-black text-white border-brand-black shadow-md";
                                    else if (isActive && !IS_CEO_MODE) btnClass += "tab-active";
                                    else btnClass += "tab-inactive";
                                    return (
                                        <button key={month} onClick={() => setSelectedMonth(month)} className={btnClass}>
                                            {IS_CEO_MODE ? <Icons.Lock size={12} className={isActive ? 'text-pink-200' : 'text-slate-400'}/> : (hasDailyDriven ? <Icons.Zap size={12} className={isActive ? 'text-amber-300' : 'text-amber-500'}/> : <Icons.Unlock size={12} className={isActive ? 'text-pink-200' : 'text-brand-magenta'}/>)}
                                            {month.substring(0,3)}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* VISTA A: VENTAS DIARIAS */}
                    {selectedMonth === 'Ventas Diarias' && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-8 page-break-inside-avoid">
                            <div className="px-5 py-4 border-b bg-emerald-50 border-emerald-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div>
                                    <h2 className="text-xl font-bold flex items-center gap-2 text-emerald-800">
                                        <Icons.ShoppingBag size={22} className="text-emerald-600"/> Libro Diario de Ventas Netas
                                    </h2>
                                </div>
                                <div className="flex items-center gap-3 bg-white p-2 rounded-lg shadow-sm border border-emerald-100">
                                    <select value={salesMonth} onChange={e => setSalesMonth(e.target.value)} className="bg-slate-50 border border-slate-300 text-sm rounded-lg p-2 font-bold outline-none cursor-pointer">
                                        {DAILY_MONTHS.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                    <select value={salesBranch} onChange={e => setSalesBranch(e.target.value)} className="bg-emerald-100 border border-emerald-300 text-emerald-900 text-sm rounded-lg p-2 font-extrabold outline-none cursor-pointer">
                                        {BRANCHES.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>
                            </div>
                            
                            <div className="overflow-y-auto max-h-[600px] relative no-scrollbar">
                                <table className="w-full text-sm text-left">
                                    <thead className="text-xs text-slate-600 uppercase bg-slate-100 sticky-head border-b-2 border-slate-300">
                                        <tr>
                                            <th className="px-3 py-3 font-extrabold text-center w-24">Fecha</th>
                                            <th className="px-3 py-3 font-bold w-1/2">Concepto / Detalle</th>
                                            <th className="px-3 py-3 font-extrabold text-right text-emerald-700">Monto Venta ($)</th>
                                            <th className="px-3 py-3 font-bold text-center w-24">Acción</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {dailySales[salesMonth][salesBranch].length === 0 ? (
                                            <tr>
                                                <td colSpan="4" className="px-4 py-8 text-center text-slate-400 font-medium">Aún no hay ventas registradas.</td>
                                            </tr>
                                        ) : (
                                            dailySales[salesMonth][salesBranch].map(sale => (
                                                <tr key={sale.id} className="hover:bg-emerald-50/30 transition-colors">
                                                    <td className="px-2 py-1">
                                                        <input type="text" placeholder="Ej: 15/5" disabled={IS_CEO_MODE} value={sale.day} onChange={(e) => updateSaleRow(sale.id, 'day', e.target.value)} className="w-full text-center p-2 font-bold text-slate-600 border border-slate-300 rounded" />
                                                    </td>
                                                    <td className="px-2 py-1">
                                                        <input type="text" placeholder="Ej: Venta" disabled={IS_CEO_MODE} value={sale.concept} onChange={(e) => updateSaleRow(sale.id, 'concept', e.target.value)} className="w-full text-left p-2 font-medium text-slate-700 border border-slate-300 rounded" />
                                                    </td>
                                                    <td className="px-2 py-1">
                                                        <CurrencyInput disabled={IS_CEO_MODE} value={sale.amount} onChange={(val) => updateSaleRow(sale.id, 'amount', val)} className="w-full text-right p-2 font-bold text-emerald-800 border border-emerald-300 bg-emerald-50 rounded" />
                                                    </td>
                                                    <td className="px-2 py-1 text-center">
                                                        {!IS_CEO_MODE && (
                                                            <button onClick={() => removeSaleRow(sale.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg"><Icons.Trash size={18} /></button>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                            
                            {!IS_CEO_MODE && (
                                <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-between items-center">
                                    <button onClick={addSaleRow} className="flex items-center gap-2 px-5 py-2.5 rounded-lg bg-emerald-100 text-emerald-700 hover:bg-emerald-200 font-bold"><Icons.Plus size={20} /> Agregar Fila</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* VISTA B: GASTOS DIARIOS */}
                    {selectedMonth === 'Gastos Diarios' && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-8 page-break-inside-avoid">
                            <div className="px-5 py-4 border-b bg-rose-50 border-rose-200 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                                <div>
                                    <h2 className="text-xl font-bold flex items-center gap-2 text-rose-800">
                                        <Icons.CreditCard size={22} className="text-rose-600"/> Libro Diario de Egresos
                                    </h2>
                                </div>
                                <div className="flex items-center gap-3 bg-white p-2 rounded-lg shadow-sm border border-rose-100">
                                    <select value={expensesMonth} onChange={e => setExpensesMonth(e.target.value)} className="bg-slate-50 border border-slate-300 text-sm rounded-lg p-2 font-bold outline-none cursor-pointer">
                                        {DAILY_MONTHS.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                    <select value={expensesBranch} onChange={e => setExpensesBranch(e.target.value)} className="bg-rose-100 border border-rose-300 text-rose-900 text-sm rounded-lg p-2 font-extrabold outline-none cursor-pointer">
                                        {BRANCHES.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>
                            </div>
                            
                            <div className="overflow-y-auto max-h-[600px] relative no-scrollbar">
                                <table className="w-full text-sm text-left">
                                    <thead className="text-xs text-slate-600 uppercase bg-slate-100 sticky-head border-b-2 border-slate-300">
                                        <tr>
                                            <th className="px-3 py-3 font-extrabold text-center w-24">Fecha</th>
                                            <th className="px-3 py-3 font-bold w-1/4">Concepto</th>
                                            <th className="px-3 py-3 font-bold text-right">G. Fijos</th>
                                            <th className="px-3 py-3 font-bold text-right">G. Variables</th>
                                            <th className="px-3 py-3 font-bold text-right text-rose-700">C. Ocultos</th>
                                            <th className="px-3 py-3 font-bold text-right text-brand-black">Gasto CEO</th>
                                            <th className="px-3 py-3 font-bold text-center">Acción</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {dailyExpenses[expensesMonth][expensesBranch].length === 0 ? (
                                            <tr>
                                                <td colSpan="7" className="px-4 py-8 text-center text-slate-400 font-medium">Aún no hay gastos registrados.</td>
                                            </tr>
                                        ) : (
                                            dailyExpenses[expensesMonth][expensesBranch].map(exp => (
                                                <tr key={exp.id} className="hover:bg-rose-50/30 transition-colors">
                                                    <td className="px-2 py-1">
                                                        <input type="text" placeholder="10/5" disabled={IS_CEO_MODE} value={exp.day} onChange={(e) => updateExpenseRow(exp.id, 'day', e.target.value)} className="w-full text-center p-2 font-bold text-slate-600 border border-slate-300 rounded" />
                                                    </td>
                                                    <td className="px-2 py-1">
                                                        <input type="text" placeholder="Alquiler" disabled={IS_CEO_MODE} value={exp.concept} onChange={(e) => updateExpenseRow(exp.id, 'concept', e.target.value)} className="w-full text-left p-2 font-medium text-slate-700 border border-slate-300 rounded" />
                                                    </td>
                                                    <td className="px-2 py-1">
                                                        <CurrencyInput disabled={IS_CEO_MODE} value={exp.fijos} onChange={(val) => updateExpenseRow(exp.id, 'fijos', val)} className="w-full text-right p-2 font-medium border border-slate-300 rounded" />
                                                    </td>
                                                    <td className="px-2 py-1">
                                                        <CurrencyInput disabled={IS_CEO_MODE} value={exp.variables} onChange={(val) => updateExpenseRow(exp.id, 'variables', val)} className="w-full text-right p-2 font-medium border border-slate-300 rounded" />
                                                    </td>
                                                    <td className="px-2 py-1 bg-rose-50/20">
                                                        <CurrencyInput disabled={IS_CEO_MODE} value={exp.ocultos} onChange={(val) => updateExpenseRow(exp.id, 'ocultos', val)} className="w-full text-right p-2 font-bold text-rose-800 border border-rose-300 bg-rose-50 rounded" />
                                                    </td>
                                                    <td className="px-2 py-1 bg-slate-100/50">
                                                        <CurrencyInput disabled={IS_CEO_MODE} value={exp.ceo} onChange={(val) => updateExpenseRow(exp.id, 'ceo', val)} className="w-full text-right p-2 font-bold text-brand-black border border-slate-300 bg-white rounded" />
                                                    </td>
                                                    <td className="px-2 py-1 text-center">
                                                        {!IS_CEO_MODE && <button onClick={() => removeExpenseRow(exp.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg"><Icons.Trash size={18} /></button>}
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>

                            {!IS_CEO_MODE && (
                                <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-between items-center">
                                    <button onClick={addExpenseRow} className="flex items-center gap-2 px-5 py-2.5 rounded-lg bg-rose-100 text-rose-700 hover:bg-rose-200 font-bold"><Icons.Plus size={20} /> Agregar Fila</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* VISTA C: RESUMEN EJECUTIVO Y MES INDIVIDUAL */}
                    {(selectedMonth === 'Resumen Ejecutivo' || MONTHS.includes(selectedMonth)) && (
                        <div className="space-y-6">
                            {MONTHS.includes(selectedMonth) && (
                                <div className="bg-white rounded-xl shadow-sm border border-brand-magenta/30 overflow-hidden mb-8 page-break-inside-avoid">
                                    <div className="px-5 py-4 border-b bg-gradient-to-r from-pink-50 to-gray-50 border-brand-magenta/20 flex justify-between items-center no-print">
                                        <h2 className="text-lg font-bold flex items-center gap-2 text-brand-magenta">
                                            <Icons.Zap size={20} className="text-brand-magenta"/> Reporte de {selectedMonth}
                                        </h2>
                                        {!effectiveData[selectedMonth]._isDailyDriven && (
                                            <button onClick={copyPreviousMonth} className="flex items-center gap-1.5 bg-white border border-brand-magenta/40 text-brand-magenta hover:bg-brand-magenta hover:text-white px-3 py-2 rounded-md text-sm font-bold shadow-sm transition-colors">
                                                <Icons.Copy size={16} /> Copiar mes anterior
                                            </button>
                                        )}
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200">
                                                <tr>
                                                    <th className="px-4 py-3 font-bold">Sucursal</th>
                                                    <th className="px-3 py-3 font-bold text-right text-brand-magenta">Ventas ($)</th>
                                                    <th className="px-3 py-3 font-bold text-right text-slate-400">Costo ($)</th>
                                                    <th className="px-3 py-3 font-bold text-right text-slate-500">Gastos ($)</th>
                                                    <th className="px-3 py-3 font-bold text-right text-amber-600">% Rentab.</th>
                                                    <th className="px-4 py-3 font-bold text-right bg-slate-100">Ganancia Neta</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {currentMonthData.map((branch, index) => {
                                                    const disabled = (DAILY_MONTHS.includes(selectedMonth) && effectiveData[selectedMonth]._isDailyDriven) || IS_CEO_MODE;
                                                    return (
                                                        <tr key={branch.name} className="hover:bg-pink-50/20">
                                                            <td className="px-4 py-3 font-bold text-slate-700">{branch.name}</td>
                                                            <td className="px-2 py-2">
                                                                <CurrencyInput disabled={disabled} value={effectiveData[selectedMonth][index].venta} onChange={(val) => handleMonthlyChange(index, 'venta', val)} className="w-full text-right p-2 font-bold border border-slate-300 rounded focus:border-brand-magenta outline-none text-brand-magenta" />
                                                            </td>
                                                            <td className="px-2 py-2">
                                                                <CurrencyInput disabled={disabled} value={effectiveData[selectedMonth][index].costo} onChange={(val) => handleMonthlyChange(index, 'costo', val)} className="w-full text-right p-2 font-medium border border-slate-300 rounded outline-none" />
                                                            </td>
                                                            <td className="px-2 py-2">
                                                                <CurrencyInput disabled={disabled} value={effectiveData[selectedMonth][index].gastosBase} onChange={(val) => handleMonthlyChange(index, 'gastosBase', val)} className="w-full text-right p-2 font-medium border border-slate-300 rounded outline-none" />
                                                            </td>
                                                            <td className="px-2 py-2 bg-amber-50/30">
                                                                <input type="number" step="0.1" disabled={disabled} value={effectiveData[selectedMonth][index].rentabPct} onChange={(e) => handleMonthlyChange(index, 'rentabPct', e.target.value)} className="w-[80px] float-right text-right p-2 font-extrabold text-lg border border-amber-400 rounded outline-none text-amber-900" />
                                                            </td>
                                                            <td className={`px-4 py-3 text-right font-extrabold text-lg ${branch.ganancia >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>
                                                                {formatCurrency(branch.ganancia)}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            <div className="bg-brand-black p-6 md:p-8 rounded-xl shadow-lg text-white">
                                <div className="flex items-center gap-3 mb-8 border-b border-[#333333] pb-4">
                                    <div className="p-2 bg-brand-magenta rounded-lg"><Icons.Globe size={24} /></div>
                                    <div>
                                        <h3 className="text-2xl font-extrabold text-white">Impacto Anual 2026</h3>
                                        <p className="text-sm text-slate-400">Estado de resultados acumulado global</p>
                                    </div>
                                </div>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-[#1f1f1f] rounded-xl border border-[#333333] p-6 space-y-4">
                                        <div className="flex justify-between font-bold text-slate-300">
                                            <span>(+) Ventas Netas Anuales</span><span className="text-xl">{formatCurrency(yearlyTotals.venta)}</span>
                                        </div>
                                        <div className="flex justify-between text-slate-400">
                                            <span>(-) Costos Directos Totales</span><span>{formatCurrency(yearlyTotals.costo)}</span>
                                        </div>
                                        <div className="flex justify-between font-bold text-brand-magenta border-t border-[#444444] pt-3">
                                            <span>(=) Margen Bruto Anual</span><span className="text-xl">{formatCurrency(yearlyTotals.rentabilidad)}</span>
                                        </div>
                                        <div className="flex justify-between text-slate-400 mt-2">
                                            <span>(-) Gastos Operativos</span><span>{formatCurrency(yearlyTotals.gastosTotales)}</span>
                                        </div>
                                        <div className={`flex justify-between font-black text-2xl border-t-2 border-[#555555] pt-4 mt-2 ${yearlyTotals.ganancia >= 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                                            <span>(=) Resultado Neto Anual</span><span>{formatCurrency(yearlyTotals.ganancia)}</span>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-[#1f1f1f] border border-[#333333] p-4 rounded-lg">
                                                <p className="text-xs uppercase text-slate-400">Margen Bruto</p>
                                                <p className="text-3xl font-extrabold text-brand-magenta">
                                                    {yearlyTotals.venta > 0 ? ((yearlyTotals.rentabilidad / yearlyTotals.venta) * 100).toFixed(1) : 0}%
                                                </p>
                                            </div>
                                            <div className="bg-[#1f1f1f] border border-[#333333] p-4 rounded-lg">
                                                <p className="text-xs uppercase text-slate-400">Margen Neto</p>
                                                <p className={`text-3xl font-extrabold ${yearlyTotals.ganancia >= 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                                                    {yearlyTotals.venta > 0 ? ((yearlyTotals.ganancia / yearlyTotals.venta) * 100).toFixed(1) : 0}%
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                <h3 className="text-lg font-bold text-slate-800 mb-1">Cruce de Punto de Equilibrio Anual</h3>
                                <div className="w-full h-[300px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ComposedChart data={annualData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }} isAnimationActive={false}>
                                            <defs>
                                                <linearGradient id="colorVentasGlobal" x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="5%" stopColor="#EC008C" stopOpacity={0.4}/>
                                                    <stop offset="95%" stopColor="#EC008C" stopOpacity={0}/>
                                                </linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                                            <YAxis tickFormatter={formatMillions} tick={{fill: '#94a3b8', fontSize: 12}} />
                                            <RechartsTooltip formatter={(value) => formatCurrency(value)} contentStyle={customTooltipStyle} />
                                            <Legend wrapperStyle={{fontSize: 12, paddingTop: '10px'}} />
                                            <Area type="monotone" dataKey="Ventas" fill="url(#colorVentasGlobal)" stroke="#EC008C" strokeWidth={3} name="Ventas Netas" />
                                            <Line type="monotone" dataKey="Ganancia" stroke="#10b981" strokeWidth={4} name="Ganancia Neta" />
                                            <Line type="stepAfter" dataKey="PuntoEquilibrio" stroke="#ef4444" strokeWidth={2} name="Punto de Eq. Total" strokeDasharray="5 5" />
                                        </ComposedChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                            
                            {/* GRÁFICOS DE COMPOSICIÓN (Solo en Resumen Ejecutivo) */}
                            {selectedMonth === 'Resumen Ejecutivo' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 page-break-inside-avoid">
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                        <h3 className="text-sm font-bold text-slate-800 mb-1">Composición de Ventas Anual</h3>
                                        <div className="w-full h-[220px]">
                                            {pieAnualVentas.length > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart isAnimationActive={false}>
                                                        <Pie data={pieAnualVentas} cx="50%" cy="50%" innerRadius={0} outerRadius={70} dataKey="venta" nameKey="name" label={({name, percent}) => percent > 0.05 ? `${name} ${(percent * 100).toFixed(0)}%` : ''} labelLine={true}>
                                                            {pieAnualVentas.map((entry, index) => <Cell key={`cell-${index}`} fill={PIE_COLORS[BRANCHES.indexOf(entry.name) % PIE_COLORS.length]} />)}
                                                        </Pie>
                                                        <RechartsTooltip formatter={(value) => formatCurrency(value)} contentStyle={customTooltipStyle} />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            ) : <div className="flex items-center justify-center h-full text-slate-400">Sin datos</div>}
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                        <h3 className="text-sm font-bold text-slate-800 mb-1">Composición de Gastos Anual</h3>
                                        <div className="w-full h-[220px]">
                                            {pieAnualGastos.length > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart isAnimationActive={false}>
                                                        <Pie data={pieAnualGastos} cx="50%" cy="50%" innerRadius={0} outerRadius={70} dataKey="gastosTotales" nameKey="name" label={({name, percent}) => percent > 0.05 ? `${name} ${(percent * 100).toFixed(0)}%` : ''} labelLine={true}>
                                                            {pieAnualGastos.map((entry, index) => <Cell key={`cell-${index}`} fill={PIE_COLORS[BRANCHES.indexOf(entry.name) % PIE_COLORS.length]} />)}
                                                        </Pie>
                                                        <RechartsTooltip formatter={(value) => formatCurrency(value)} contentStyle={customTooltipStyle} />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            ) : <div className="flex items-center justify-center h-full text-slate-400">Sin datos</div>}
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
