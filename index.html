                                            </tr>
                                            <tr className="hover:bg-slate-50 bg-blue-50/40">
                                                <td className="px-4 py-3 font-bold text-blue-900 text-left sticky-col bg-blue-50/90 shadow-[1px_0_0_#e2e8f0]">(=) Margen Bruto</td>
                                                {MONTHS.map(m => <td key={m} className="px-3 py-2 font-bold text-blue-800">{formatCompact(annualData.find(d => d.fullMonth === m).Rentabilidad)}</td>)}
                                                <td className="px-4 py-2 font-extrabold bg-blue-100 text-blue-900">{formatCurrency(yearlyTotals.rentabilidad)}</td>
                                            </tr>
                                            <tr className="hover:bg-slate-50">
                                                <td className="px-4 py-3 font-medium text-slate-500 text-left sticky-col bg-white shadow-[1px_0_0_#e2e8f0]">(-) Gastos Fijos/Var</td>
                                                {MONTHS.map(m => <td key={m} className="px-3 py-2 text-slate-500">{formatCompact(fullYearData[m].reduce((sum, b) => sum + b.gastosBase, 0))}</td>)}
                                                <td className="px-4 py-2 font-bold bg-slate-50 text-slate-600">{formatCurrency(yearlyTotals.gastosBase)}</td>
                                            </tr>
                                            <tr className="hover:bg-slate-50">
                                                <td className="px-4 py-3 font-medium text-indigo-500 text-left sticky-col bg-white shadow-[1px_0_0_#e2e8f0]">(-) Gasto CEO</td>
                                                {MONTHS.map(m => <td key={m} className="px-3 py-2 text-indigo-400">{formatCompact(fullYearData[m].reduce((sum, b) => sum + b.gastoCEO, 0))}</td>)}

                                            </tr>
                                            <tr className="hover:bg-slate-50">
                                                <td className="px-4 py-3 font-medium text-rose-500 text-left sticky-col bg-white shadow-[1px_0_0_#e2e8f0]">(-) Costos Ocultos</td>
                                                {MONTHS.map(m => <td key={m} className="px-3 py-2 text-rose-400">{formatCompact(fullYearData[m].reduce((sum, b) => sum + b.costosOcultos, 0))}</td>)}

                                            </tr>

                                            <tr className="bg-slate-800 text-white font-bold">
                                                <td className="px-4 py-4 text-left sticky-col bg-slate-800 shadow-[1px_0_0_#334155] text-lg">(=) Ganancia Neta</td>
                                                {MONTHS.map(m => {
                                                    const gan = annualData.find(d => d.fullMonth === m).Ganancia;
                                                    return <td key={m} className={`px-3 py-4 text-base ${gan >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>{formatCompact(gan)}</td>

                                        </tfoot>
                                    </table>

                                    <Icons.Table size={20} className="text-emerald-600" />

                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left">
                                        <thead className="text-xs text-slate-500 uppercase bg-slate-100 border-b border-slate-200">
                                            <tr>
                                                <th className="px-4 py-3 font-bold sticky-col bg-slate-100 shadow-[1px_0_0_#e2e8f0]">Sucursal</th>

                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">

                                                <tr key={row.name} className="hover:bg-slate-50">
                                                    <td className="px-4 py-3 font-bold text-slate-700 sticky-col bg-white shadow-[1px_0_0_#e2e8f0]">{row.name}</td>
                                                    {MONTHS.map(m => (
                                                        <td key={m} className={`px-3 py-3 text-right font-medium ${row[m] > 0 ? 'text-emerald-600' : (row[m] < 0 ? 'text-red-600' : 'text-slate-400')}`}>

                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                        <tfoot>
                                            <tr className="bg-slate-800 text-white font-bold">
                                                <td className="px-4 py-3 sticky-col bg-slate-800 shadow-[1px_0_0_#334155]">Total Empresa</td>
                                                {MONTHS.map(m => {
                                                    const totalMes = matrixGanancia.reduce((sum, r) => sum + r[m], 0);
                                                    return (
                                                        <td key={m} className={`px-3 py-3 text-right ${totalMes >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                                            {formatCompact(totalMes)}
                                                        </td>
                                                    );
                                                })}
                                                <td className={`px-4 py-3 text-right text-lg ${yearlyTotals.ganancia >= 0 ? 'text-emerald-400' : 'text-red-400'} bg-slate-900`}>
                                                    {formatCurrency(yearlyTotals.ganancia)}
                                                </td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}


                    {/* ========================================================================= */}
                    {/* VISTA D: MES INDIVIDUAL (Enero a Diciembre) */}

                    {!['Resumen Ejecutivo', 'Ventas Diarias', 'Gastos Diarios'].includes(selectedMonth) && (
                        <div>
                            {/* TABLA DE CARGA / LECTURA DEL MES */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-8 page-break-inside-avoid">
                                <div className={`px-5 py-4 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-4 ${IS_CEO_MODE ? 'bg-slate-50 border-slate-200' : 'bg-gradient-to-r from-blue-50 to-indigo-50 border-blue-200'} no-print`}>
                                    <div className="flex flex-col gap-1">
                                        <h2 className={`text-lg font-bold flex items-center gap-2 ${IS_CEO_MODE ? 'text-slate-800' : 'text-blue-800'}`}>
                                            {IS_CEO_MODE ? <Icons.Activity size={20} className="text-indigo-600"/> : <Icons.Zap size={20} className="text-amber-500"/>} 
                                            Reporte del Mes - {selectedMonth}
                                        </h2>
                                        {DAILY_MONTHS.includes(selectedMonth) && !IS_CEO_MODE && (
                                            effectiveData[selectedMonth]._isDailyDriven 
                                                ? <p className="text-xs text-amber-700 font-bold bg-amber-100 px-2 py-1 rounded inline-block mt-1 w-max">⚠️ Modo Automatizado: Los datos provienen del Libro Diario y no se pueden editar aquí.</p>
                                                : <p className="text-xs text-blue-700 font-bold bg-blue-100 px-2 py-1 rounded inline-block mt-1 w-max">✏️ Modo Manual: Puedes cargar tus datos aquí, o usar los Libros Diarios para automatizarlo.</p>

                                    </div>
                                    {(!DAILY_MONTHS.includes(selectedMonth) || !effectiveData[selectedMonth]._isDailyDriven) && (
                                        <button onClick={copyPreviousMonth} className="flex items-center gap-1.5 bg-white border border-blue-300 text-blue-700 hover:bg-blue-600 hover:text-white px-3 py-2 rounded-md text-sm font-bold transition-all shadow-sm">
                                            <Icons.Copy size={16} /> Copiar mes anterior
                                        </button>
                                    )}
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left">

                                            <tr>
                                                <th className="px-4 py-3 font-bold">Sucursal</th>
                                                <th className="px-3 py-3 font-bold text-right text-blue-600">Ventas Netas ($)</th>
                                                <th className="px-3 py-3 font-bold text-right text-slate-400">Costo Venta ($)</th>
                                                <th className="px-3 py-3 font-bold text-right" title="Fijos + Variables">Gastos Fijos/Var ($)</th>
                                                <th className="px-3 py-3 font-bold text-right text-indigo-600">Gasto CEO ($)</th>
                                                <th className="px-3 py-3 font-bold text-right text-rose-500">Costos Ocultos ($)</th>

                                                <th className="px-4 py-3 font-bold text-right bg-slate-100">Punto Eq. Calculado</th>
                                                <th className="px-4 py-3 font-bold text-right bg-slate-100">Ganancia Neta</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {currentMonthData.map((branch, index) => {
                                                const isDailyAuto = DAILY_MONTHS.includes(selectedMonth) && effectiveData[selectedMonth]._isDailyDriven && !IS_CEO_MODE;
                                                const fieldDisabled = isDailyAuto || IS_CEO_MODE;
                                                
                                                return (
                                                    <tr key={branch.name} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-4 py-3 font-bold text-slate-700">{branch.name}</td>

                                                                className={`w-full text-right p-2 font-bold min-w-[120px] transition-all ${fieldDisabled ? 'text-slate-800 bg-transparent border-transparent' : 'border border-slate-300 rounded focus:border-blue-500 focus:ring-2 focus:ring-blue-200 text-blue-700 outline-none'}`} />
                                                        </td>
                                                        <td className="px-2 py-2">
                                                            <CurrencyInput disabled={fieldDisabled} value={effectiveData[selectedMonth][index].costo} onChange={(val) => handleMonthlyChange(index, 'costo', val)}
                                                                className={`w-full text-right p-2 font-medium min-w-[120px] transition-all ${fieldDisabled ? 'text-slate-500 bg-transparent border-transparent' : 'border border-slate-300 rounded focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none'}`} />
                                                        </td>
                                                        <td className="px-2 py-2">
                                                            <CurrencyInput disabled={fieldDisabled} value={effectiveData[selectedMonth][index].gastosBase} onChange={(val) => handleMonthlyChange(index, 'gastosBase', val)}

                                                        </td>
                                                        <td className="px-2 py-2">
                                                            <CurrencyInput disabled={fieldDisabled} value={effectiveData[selectedMonth][index].gastoCEO} onChange={(val) => handleMonthlyChange(index, 'gastoCEO', val)}

                                                        </td>
                                                        <td className="px-2 py-2">
                                                            <CurrencyInput disabled={fieldDisabled} value={effectiveData[selectedMonth][index].costosOcultos} onChange={(val) => handleMonthlyChange(index, 'costosOcultos', val)}

                                                        <td className="px-4 py-3 text-right bg-slate-50 font-bold text-slate-800 whitespace-nowrap">{formatCurrency(branch.puntoEquilibrio)}</td>

                                                            {formatCurrency(branch.ganancia)}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                                    <p className="text-xs text-slate-500 mb-4">Ganancia y pérdida en este mes</p>
                                    <div className="w-full h-[280px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={currentMonthData} layout="vertical" margin={{ top: 5, right: 30, left: 10, bottom: 5 }} isAnimationActive={false}>
                                                <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} stroke="#f1f5f9" />
                                                <XAxis type="number" tickFormatter={formatMillions} tick={{fill: '#94a3b8', fontSize: 12}} />
                                                <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{fill: '#475569', fontWeight: 'bold', fontSize: 12}} width={70} />
                                                <RechartsTooltip formatter={(value) => formatCurrency(value)} contentStyle={customTooltipStyle} />
                                                <ReferenceLine x={0} stroke="#475569" strokeWidth={2} />
                                                <Bar dataKey="ganancia" name="Ganancia Neta" radius={[0, 4, 4, 0]} barSize={25}>
                                                    {currentMonthData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.ganancia >= 0 ? '#10b981' : '#ef4444'} />)}
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                                <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 xl:col-span-2">
                                    <h3 className="text-base font-bold text-slate-800 mb-1">Cruce de Punto de Equilibrio Anual</h3>
                                    <p className="text-xs text-slate-500 mb-4">Ventas Netas vs Meta de Equilibrio Total (Suma lineal)</p>

                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={annualData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }} isAnimationActive={false}>
                                                <defs>
                                                    <linearGradient id="colorVentasAnual" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4}/>
                                                        <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                                                    </linearGradient>

                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} dy={10} />
                                                <YAxis axisLine={false} tickLine={false} tickFormatter={formatMillions} tick={{fill: '#94a3b8', fontSize: 12}} />
                                                <RechartsTooltip formatter={(value) => formatCurrency(value)} contentStyle={customTooltipStyle} />
                                                <Legend wrapperStyle={{fontSize: 12, paddingTop: '10px'}} />
                                                <Area type="monotone" dataKey="Ventas" fill="url(#colorVentasAnual)" stroke="#3b82f6" strokeWidth={3} name="Ventas Netas Totales" />
                                                <Line type="stepAfter" dataKey="PuntoEquilibrio" stroke="#ef4444" strokeWidth={3} name="Punto de Eq. Total" dot={false} strokeDasharray="5 5" />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>

                                        {pieMensualVentas.length > 0 ? (
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart isAnimationActive={false}>

                                                        {pieMensualVentas.map((entry, index) => <Cell key={`cell-${index}`} fill={PIE_COLORS[BRANCHES.indexOf(entry.name) % PIE_COLORS.length]} />)}
                                                    </Pie>
                                                    <RechartsTooltip formatter={(value) => formatCurrency(value)} contentStyle={customTooltipStyle} />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        ) : <div className="flex items-center justify-center h-full text-slate-400 font-bold">Sin registros de venta</div>}
                                    </div>
                                </div>
                                <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                    <h3 className="text-base font-bold text-slate-800 mb-1">Composición de Gastos Totales - {selectedMonth}</h3>

                                            <ResponsiveContainer width="100%" height="100%">

                                                        {pieMensualGastos.map((entry, index) => <Cell key={`cell-${index}`} fill={PIE_COLORS[BRANCHES.indexOf(entry.name) % PIE_COLORS.length]} />)}

                                                </PieChart>
                                            </ResponsiveContainer>
                                        ) : <div className="flex items-center justify-center h-full text-slate-400 font-bold">Sin registros de gasto</div>}
                                    </div>
                                </div>
                            </div>

                                <div className="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">

                                        <h3 className="text-xl font-bold text-slate-800">Estado de Resultados Consolidado</h3>
                                        <p className="text-sm text-slate-500">Resumen operativo y diagnóstico para {selectedMonth}</p>
                                    </div>
                                </div>
                                <div className="flex flex-col lg:flex-row gap-8">
                                    <div className="flex-1">
                                        <div className="bg-slate-50 rounded-lg border border-slate-200 p-5 h-full">
                                            <div className="space-y-4 text-base">
                                                <div className="flex justify-between items-center font-bold text-slate-700">
                                                    <span>(+) Ventas Netas Totales</span>
                                                    <span className="text-lg">{formatCurrency(monthlyTotals?.venta)}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-slate-600">
                                                    <span>(-) Costos Directos</span>
                                                    <span>{formatCurrency(monthlyTotals?.costo)}</span>
                                                </div>
                                                <div className="flex justify-between items-center font-bold text-blue-700 border-t border-slate-300 pt-3 mt-1">
                                                    <span>(=) Margen Bruto (Rentabilidad)</span>
                                                    <span className="text-lg">{formatCurrency(monthlyTotals?.rentabilidad)}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-slate-600 mt-2">
                                                    <span>(-) Gastos Fijos y Variables (Base)</span>
                                                    <span>{formatCurrency(monthlyTotals?.gastosBase)}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-indigo-600 mt-2">
                                                    <span>(-) Gastos CEO</span>
                                                    <span>{formatCurrency(monthlyTotals?.gastoCEO)}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-rose-600 mt-2">
                                                    <span>(-) Comisiones y Costos Ocultos</span>
                                                    <span>{formatCurrency(monthlyTotals?.costosOcultos)}</span>
                                                </div>
                                                <div className={`flex justify-between items-center font-black text-xl border-t-2 border-slate-800 pt-4 mt-2 ${(monthlyTotals?.ganancia || 0) >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                    <span>(=) Resultado Neto Operativo</span>
                                                    <span>{formatCurrency(monthlyTotals?.ganancia)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col justify-between gap-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm">
                                                <p className="text-sm font-semibold text-slate-500 uppercase tracking-wide">Margen Bruto Mensual</p>
                                                <p className="text-3xl font-extrabold text-blue-600 mt-1">
                                                    {(monthlyTotals?.venta || 0) > 0 ? ((monthlyTotals.rentabilidad / monthlyTotals.venta) * 100).toFixed(1) : 0}%
                                                </p>
                                            </div>
                                            <div className="bg-white border border-slate-200 p-4 rounded-lg shadow-sm">
                                                <p className="text-sm font-semibold text-slate-500 uppercase tracking-wide">Margen Neto Mensual</p>
                                                <p className={`text-3xl font-extrabold mt-1 ${(monthlyTotals?.ganancia || 0) >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                    {(monthlyTotals?.venta || 0) > 0 ? ((monthlyTotals.ganancia / monthlyTotals.venta) * 100).toFixed(1) : 0}%
                                                </p>
                                            </div>
                                        </div>
                                        <div className="bg-indigo-50 border border-indigo-100 p-5 rounded-lg flex-1">
                                            <h4 className="font-bold text-indigo-900 mb-2 flex items-center gap-2">
                                                <Icons.Activity size={16} /> Diagnóstico del Mes
                                            </h4>
                                            <p className="text-sm text-indigo-800 leading-relaxed font-medium">
                                                {(monthlyTotals?.ganancia || 0) > 0 
                                                    ? `La operativa es saludable. Los costos y gastos consumen el ${(((monthlyTotals.costo + monthlyTotals.gastosTotales) / monthlyTotals.venta) * 100).toFixed(1)}% de los ingresos totales. Utilidad: ${formatCurrency(monthlyTotals.ganancia)}.`
                                                    : (monthlyTotals?.venta || 0) === 0
                                                        ? `Sin ventas registradas. Déficit operativo de ${formatCurrency(monthlyTotals?.gastosTotales)}.`
                                                        : `El negocio opera a pérdida. Se requieren ventas adicionales por ${formatCurrency(monthlyTotals.puntoEquilibrio - monthlyTotals.venta)} para el punto de equilibrio.`
                                                }
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            {/* SALUD FINANCIERA GLOBAL 2026 AL FONDO DEL MES (COMO ESTABA ANTES) */}
                            <div className="print-page-break mt-8">
                                <div className="bg-slate-900 p-6 md:p-8 rounded-xl shadow-lg border border-slate-800 text-white relative overflow-hidden page-break-inside-avoid">
                                    <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none no-print">
                                        <Icons.Globe size={150} />
                                    </div>
                                    <div className="flex items-center gap-3 mb-8 border-b border-slate-700 pb-4 relative z-10">
                                        <div className="p-2 bg-indigo-600 rounded-lg text-white">
                                            <Icons.Globe size={24} />
                                        </div>
                                        <div>
                                            <h3 className="text-2xl font-extrabold text-white">Impacto Anual 2026</h3>
                                            <p className="text-sm text-slate-400">Cómo este mes afecta al Estado de Resultados de todo el año</p>
                                        </div>
                                    </div>

                                    <div className="flex flex-col lg:flex-row gap-8 relative z-10">
                                        <div className="flex-1">
                                            <div className="bg-slate-800 rounded-xl border border-slate-700 p-6 h-full">
                                                <div className="space-y-4 text-base">
                                                    <div className="flex justify-between items-center font-bold text-slate-300">
                                                        <span>(+) Ventas Netas Anuales</span>
                                                        <span className="text-xl">{formatCurrency(yearlyTotals.venta)}</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-slate-400">
                                                        <span>(-) Costos Directos Totales</span>
                                                        <span>{formatCurrency(yearlyTotals.costo)}</span>
                                                    </div>
                                                    <div className="flex justify-between items-center font-bold text-indigo-400 border-t border-slate-600 pt-3 mt-1">
                                                        <span>(=) Margen Bruto Anual</span>
                                                        <span className="text-xl">{formatCurrency(yearlyTotals.rentabilidad)}</span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-slate-400 mt-2">
                                                        <span>(-) Gastos Operativos</span>
                                                        <span>{formatCurrency(yearlyTotals.gastosTotales)}</span>
                                                    </div>
                                                    <div className={`flex justify-between items-center font-black text-2xl border-t-2 border-slate-500 pt-4 mt-2 ${yearlyTotals.ganancia >= 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                                                        <span>(=) Resultado Neto Anual</span>
                                                        <span>{formatCurrency(yearlyTotals.ganancia)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
